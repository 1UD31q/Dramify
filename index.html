<!DOCTYPE html>
<html lang="ru">

  :root{
    --ink:#3B2247;
    --ink-soft:#54325F;
    --paper:#F7ECF3;
    --surface:#FFFFFF;
    --muted:#8A7189;
    --line:#EDDCE8;

    --teal-dark:#154F46;
    --teal-tint:#E4F1EE;
    --rust:#B5502F;
    --rust-dark:#8A3B22;
    --rust-tint:#F7E9E3;

  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .display{font-family:'Space Grotesk',sans-serif;}

  .app{max-width:640px;margin:0 auto;min-height:100vh;background:var(--paper);display:flex;flex-direction:column;}

  .cover{background:linear-gradient(155deg, var(--ink) 0%, var(--ink-soft) 100%);border-radius:0 0 22px 22px;padding:26px 20px 20px 20px;box-shadow:0 12px 28px -16px rgba(0,0,0,.45);}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
  .stamp{width:38px;height:38px;flex:none;border-radius:50%;border:1.5px solid rgba(255,255,255,.55);display:flex;align-items:center;justify-content:center;position:relative;}
  .stamp::before{content:'';position:absolute;inset:5px;border-radius:50%;border:1px dashed rgba(255,255,255,.35);}
  .stamp svg{width:16px;height:16px;position:relative;}
  .brand h1{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin:0;letter-spacing:-0.01em;color:#fff;}
  .brand .subtitle{font-family:'IBM Plex Mono',monospace;font-size:11px;color:rgba(255,255,255,.55);margin-top:3px;letter-spacing:.02em;}

  .tabs{display:flex;gap:4px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:4px;}
  .tab{flex:1;text-align:center;padding:9px 0;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:rgba(255,255,255,.6);user-select:none;transition:all .15s;}
  .tab.active{background:#fff;color:var(--ink);}

  main{flex:1;padding:20px 20px 44px 20px;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:0 1px 2px rgba(24,34,40,.03);}
  .card h2{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;margin:0 0 14px 0;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}

  select, input[type=text], input[type=number]{
    width:100%;padding:11px 12px;border-radius:9px;border:1px solid var(--line);
    font-family:'Inter',sans-serif;font-size:14px;background:#fff;color:var(--ink);

  label.field-label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500;}

  .punch-wrap{display:flex;flex-direction:column;align-items:center;padding:6px 0 4px 0;}
  .status-pill{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);margin-bottom:20px;font-weight:500;}
  .status-pill .dot{width:8px;height:8px;border-radius:50%;}
  .dot.in{background:var(--teal);}
  .dot.out{background:var(--muted);}

  .punch-ring{position:relative;width:172px;height:172px;display:flex;align-items:center;justify-content:center;}
  .punch-ring.on-shift::before{
    content:'';position:absolute;inset:0;border-radius:50%;border:2px solid var(--teal);
    animation:breathe 2.6s ease-in-out infinite;
  }
  @keyframes breathe{
    0%,100%{transform:scale(1);opacity:.55;}
    50%{transform:scale(1.12);opacity:0;}
  }
  @media (prefers-reduced-motion: reduce){ .punch-ring.on-shift::before{animation:none;opacity:0;} }

  .plan-bar-fill{height:100%;background:var(--teal);border-radius:5px;transition:width .3s;}

  th{text-align:left;font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:6px 8px;border-bottom:1px solid var(--line);font-weight:600;}

  .status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;}

  .row input, .row select{flex:1;}
  .btn{background:var(--ink);color:#fff;border:none;border-radius:9px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .15s;}
  .btn:hover{opacity:.9;}
  .btn.secondary{background:transparent;border:1px solid var(--line);color:var(--ink);}
  .btn.small{padding:7px 12px;font-size:12px;}
  .btn.teal{background:var(--teal);}

  .pin-wrap{display:flex;flex-direction:column;align-items:center;padding:12px 0 4px 0;text-align:center;}
  .pin-wrap p{color:var(--muted);font-size:13px;margin:6px 0 18px 0;}
  .pin-dots{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;justify-content:center;max-width:220px;}
  .pin-dots .slot{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--line);background:#fff;transition:all .12s;}

  .keypad{display:grid;grid-template-columns:repeat(3,56px);gap:10px;}

  .name-list{display:flex;flex-direction:column;gap:8px;}
  .name-btn{text-align:left;padding:11px 14px;border-radius:10px;border:1px solid var(--line);background:#fff;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:12px;color:var(--ink);transition:border-color .12s;}

  .avatar{width:34px;height:34px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;}

  .avatar.to{background:var(--teal-tint);color:var(--teal-dark);}

  .month-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;}

</style>

async function storeGet(key, shared){
  if(shared){
    try{
      const res = await fetch(`${SUPABASE_URL}/rest/v1/kv_store?key=eq.${encodeURIComponent(key)}&select=value`, {
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY }
      });
      if(!res.ok) { console.error('Supabase вернул статус:', res.status); return null; }
      const data = await res.json();
      if(!data || !data.length) return null;
      return JSON.parse(data[0].value);
    }catch(e){ console.error('storeGet failed', e); return null; }
  } else {
    try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
    catch(e){ return null; }
  }
}

async function storeSet(key, value, shared){
  if(shared){
    try{
      await fetch(`${SUPABASE_URL}/rest/v1/kv_store?on_conflict=key`, {
        method: 'POST',
        headers:{
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'resolution=merge-duplicates,return=minimal'
        },
        body: JSON.stringify([{ key, value: JSON.stringify(value), updated_at: new Date().toISOString() }])
      });
    }catch(e){ console.error('storeSet failed', e); }
  } else {
    try{ localStorage.setItem(key, JSON.stringify(value)); }catch(e){ console.error(e); }
  }
}

function zeroKpi(dept){
  const o = {};
  DEPARTMENTS[dept].fields.forEach(f=> o[f.key] = f.type==='number' ? 0 : '');

}

function currentMonthKey(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
function monthLabel(key){
  const [y,m] = key.split('-');
  const names = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

const SEED_MONTH_DATA = {
  e1: {orders:15, completed:15, netAmount:983979, avgCheck:65599, pending:0, completionTime:''},
  e2: {orders:20, completed:19, netAmount:924700, avgCheck:48668, pending:40000, completionTime:''},
  e3: {orders:7, completed:6, netAmount:351200, avgCheck:58533, pending:0, completionTime:''},

async function loadAll(){
  try {
    employees = await storeGet('app:employees', SHARED);
    if(!employees){ employees = SEED_EMPLOYEES; await storeSet('app:employees', employees, SHARED); }
  } catch(e) { console.error(e); employees = SEED_EMPLOYEES; }

function ensureMonth(monthKey){
  if(!kpiData[monthKey]) kpiData[monthKey] = {};
  employees.forEach(e=>{
    if(!kpiData[monthKey][e.id]) kpiData[monthKey][e.id] = zeroKpi(e.department);
  });
}

function getKpi(empId, monthKey){
  const emp = employees.find(e=>e.id===empId);
  ensureMonth(monthKey);
  return kpiData[monthKey][empId] || zeroKpi(emp.department);
}

function fmtMoney(n){ return new Intl.NumberFormat('ru-RU').format(Math.round(n)) + ' ₸'; }
function fmtTime(ts){ return new Date(ts).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}); }
function fmtDateTime(ts){ const d=new Date(ts); return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'}) + ' ' + fmtTime(ts); }
function isToday(ts){ return new Date(ts).toDateString() === new Date().toDateString(); }

function lastLogFor(empId){
  const list = logs.filter(l=>l.empId===empId).sort((a,b)=>b.ts-a.ts);
  return list[0] || null;
}
function isCheckedIn(empId){ const last = lastLogFor(empId); return last && last.type === 'in'; }
function todayHoursFor(empId){
  const todays = logs.filter(l=>l.empId===empId && isToday(l.ts)).sort((a,b)=>a.ts-b.ts);
  let total = 0, openIn = null;
  todays.forEach(l=>{
    if(l.type==='in') openIn = l.ts;
    else if(l.type==='out' && openIn!==null){ total += (l.ts-openIn); openIn=null; }
  });
  if(openIn!==null) total += (Date.now()-openIn);
  return total;
}
function fmtDuration(ms){
  const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000);
  return (h>0? h+'ч ' : '') + m + 'м';
}

  ensureMonth(editingMonth);
  await storeSet('app:employees', employees, SHARED);

}

function parseCSV(text){
  const rows = []; let row = []; let field=''; let inQuotes=false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else inQuotes=false; }
      else field+=c;
    } else {
      if(c==='"') inQuotes=true;
      else if(c===','){ row.push(field); field=''; }
      else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else if(c==='\r'){ /* skip */ }
      else field+=c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r=> r.some(c=>c.trim()!==''));
}

function parseNum(s){
  if(s===null || s===undefined) return 0;
  let t = String(s).replace(/[^\d.,\-]/g,'');
  if(t==='') return 0;
  if(t.includes(',') && t.includes('.')){
    if(t.lastIndexOf(',') > t.lastIndexOf('.')){ t = t.replace(/\./g,'').replace(',', '.'); }
    else { t = t.replace(/,/g,''); }
  } else if(t.includes(',')){
    t = t.replace(',', '.');
  }
  const n = parseFloat(t);
  return isNaN(n) ? 0 : Math.round(n);
}

function toCsvUrl(url){
  const m = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
  if(m && url.includes('/edit')){
    const gidMatch = url.match(/gid=([0-9]+)/);
    const gid = gidMatch ? gidMatch[1] : '0';
    return `https://docs.google.com/spreadsheets/d/${m[1]}/export?format=csv&gid=${gid}`;
  }
  return url; 
}

async function syncFromGoogleSheet(dept, targetMonth, silent){
  targetMonth = targetMonth || editingMonth;
  const rawUrl = (sheetUrls[dept]||'').trim();
  if(!rawUrl){ if(!silent) syncStatus[dept] = 'Сначала вставьте ссылку на таблицу'; return; }
  if(!silent){ syncing[dept] = true; syncStatus[dept] = ''; render(); }
  try{
    const url = toCsvUrl(rawUrl);
    const res = await fetch(url);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    if(rows.length < 2) throw new Error('Таблица пустая или не найдена');

    const header = rows[0].map(h=>h.trim());
    const hl = header.map(h=>h.toLowerCase());
    const findCol = (patterns)=> hl.findIndex(h=> patterns.some(p=>h.includes(p)));

    const sellerCol = findCol(['кто продал']);
    const doerCol = findCol(['кто делает']);
    const statusCol = findCol(['статус']);
    const grossCol = findCol(['сумма общая','сумма']);
    const netCol = findCol(['заработок']);
    const pendingCol = findCol(['остаток']);
    const dateCol = findCol(['дата оформления','дата']);
    const isRawLedger = sellerCol>=0 || doerCol>=0;

    ensureMonth(targetMonth);
    const deptEmployees = employees.filter(e=>e.department===dept);
    let matched = 0;

    if(isRawLedger){
      const actorCol = dept==='op' ? sellerCol : doerCol;
      if(actorCol<0) throw new Error('Не нашёл колонку «' + (dept==='op'?'Кто продал':'Кто делает') + '»');

      for(const emp of deptEmployees){
        const nameLc = emp.name.trim().toLowerCase();
        let orders=0, completed=0, netAmount=0, pending=0, revenue=0, deals=0;
        for(let r=1;r<rows.length;r++){
          const row = rows[r];
          const actor = (row[actorCol]||'').trim().toLowerCase();
          if(actor !== nameLc) continue;
          if(dateCol>=0){
            const dm = String(row[dateCol]||'').trim().match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
            if(dm){
              const mk = dm[3] + '-' + String(Number(dm[2])).padStart(2,'0');
              if(mk !== targetMonth) continue;
            }
          }
          if(dept==='to'){
            orders++;
            const statusText = statusCol>=0 ? (row[statusCol]||'').toLowerCase() : '';
            if(statusText.includes('успешно')) completed++;
            if(netCol>=0) netAmount += parseNum(row[netCol]);
            if(pendingCol>=0) pending += parseNum(row[pendingCol]);
          } else {
            deals++;
            if(grossCol>=0) revenue += parseNum(row[grossCol]);
          }
        }
        const values = getKpi(emp.id, targetMonth);
        if(dept==='to'){
          values.orders = orders; values.completed = completed; values.netAmount = netAmount;
          values.pending = pending; values.avgCheck = orders>0 ? Math.round(netAmount/orders) : 0;
        } else {
          values.deals = deals; values.revenue = revenue;
        }
        kpiData[targetMonth][emp.id] = values;
        if(orders>0 || deals>0) matched++;
      }
    } else {
      const nameIdx = header.findIndex(h=>/имя|name/i.test(h));
      const idx = nameIdx>=0 ? nameIdx : 0;
      const fieldCols = {};
      DEPARTMENTS[dept].fields.filter(f=>!f.computed).forEach(f=>{
        const colIndex = header.findIndex((h,ci)=>{
          if(ci===idx) return false;
          const hlow = h.toLowerCase();
          const m = f.match.some(mm=>hlow.includes(mm));
          const ex = (f.exclude||[]).some(mm=>hlow.includes(mm));
          return m && !ex;
        });
        if(colIndex>=0) fieldCols[f.key] = colIndex;
      });
      for(let r=1;r<rows.length;r++){
        const row = rows[r];
        const name = (row[idx]||'').trim();
        if(!name) continue;
        const emp = deptEmployees.find(e=>e.name.trim().toLowerCase()===name.toLowerCase());
        if(!emp) continue;
        const values = getKpi(emp.id, targetMonth);
        Object.keys(fieldCols).forEach(fk=>{
          const raw = row[fieldCols[fk]];
          const fieldDef = DEPARTMENTS[dept].fields.find(f=>f.key===fk);
          values[fk] = fieldDef.type==='number' ? parseNum(raw) : (raw||'').trim();
        });
        kpiData[targetMonth][emp.id] = values;
        matched++;
      }
    }

    await storeSet('app:kpiData', kpiData, SHARED);
    await storeSet('app:sheetUrls', sheetUrls, SHARED);
    if(!silent){
      syncStatus[dept] = matched>0
        ? `Обновлено ${matched} из ${deptEmployees.length} сотрудников`
        : 'Никто не найден — проверьте, что имена в таблице совпадают с именами в приложении';
    }
  } catch(err){
    if(!silent) syncStatus[dept] = 'Не получилось: ' + err.message;
  }
  if(!silent){ syncing[dept] = false; render(); }
  else if(mode==='employee'){ render(); }
}

async function silentAutoSync(){
  try{
    if((sheetUrls.op||'').trim()) await syncFromGoogleSheet('op', activeMonth, true);
    if((sheetUrls.to||'').trim()) await syncFromGoogleSheet('to', activeMonth, true);
  }catch(e){ console.error('auto-sync failed', e); }
}

}

function attachHandlers(){
  document.querySelectorAll('.tab').forEach(t=>{
    t.onclick = ()=>{ mode = t.dataset.mode; render(); };
  });

  document.querySelectorAll('[data-pick]').forEach(btn=>{
    btn.onclick = ()=>{ selectingEmpId = btn.dataset.pick; empPinInput=''; empPinError=''; render(); };
  });
  const backBtn = document.getElementById('backToList');
  if(backBtn) backBtn.onclick = ()=>{ selectingEmpId = null; render(); };

  document.querySelectorAll('.keypad button[data-empkey]').forEach(btn=>{
    btn.onclick = async ()=>{
      const k = btn.dataset.empkey;
      if(k==='⌫'){ empPinInput = empPinInput.slice(0,-1); empPinError=''; }
      else if(empPinInput.length<EMP_PIN_LEN){ empPinInput += k; empPinError=''; }
      if(empPinInput.length===EMP_PIN_LEN){
        const emp = employees.find(e=>e.id===selectingEmpId);
        if(empPinInput===emp.pin){
          myEmployeeId = emp.id;
          await storeSet('app:myEmployeeId', emp.id, false);
          selectingEmpId = null; empPinInput='';
        } else { empPinError = 'Неверный PIN'; empPinInput=''; }
      }
      render();
    };
  });

  document.querySelectorAll('.keypad button[data-key]').forEach(btn=>{
    btn.onclick = ()=>{
      const k = btn.dataset.key;
      if(k==='⌫'){ pinInput = pinInput.slice(0,-1); pinError=''; }
      else if(pinInput.length<ADMIN_PIN_LEN){ pinInput += k; pinError=''; }
      if(pinInput.length===ADMIN_PIN_LEN){
        if(pinInput===adminPin){ adminUnlocked=true; pinInput=''; }
        else { pinError='Неверный PIN'; pinInput=''; }
      }
      render();
    };
  });

  const punchBtn = document.getElementById('punchBtn');
  if(punchBtn) punchBtn.onclick = ()=> punch(myEmployeeId);

  const switchUser = document.getElementById('switchUser');
  if(switchUser) switchUser.onclick = async ()=>{ myEmployeeId=null; await storeSet('app:myEmployeeId', null, false); render(); };

  const monthSelect = document.getElementById('monthSelect');
  if(monthSelect) monthSelect.onchange = (e)=>{ editingMonth = e.target.value; render(); };

  const addMonthBtn = document.getElementById('addMonthBtn');
  if(addMonthBtn) addMonthBtn.onclick = ()=>{
    const now = new Date();
    const next = new Date(now.getFullYear(), now.getMonth()+1, 1);
    const suggested = next.getFullYear() + '-' + String(next.getMonth()+1).padStart(2,'0');
    const val = prompt('Новый месяц в формате ГГГГ-ММ:', suggested);
    if(val) addMonth(val.trim());
  };

  const activateBtn = document.getElementById('activateBtn');
  if(activateBtn) activateBtn.onclick = ()=> activateMonth(editingMonth);

  const saveBtn = document.getElementById('saveKpiBtn');
  if(saveBtn) saveBtn.onclick = async ()=>{
    const inputs = document.querySelectorAll('[data-emp]');
    const grouped = {};
    inputs.forEach(i=>{ grouped[i.dataset.emp] = grouped[i.dataset.emp] || {}; grouped[i.dataset.emp][i.dataset.field] = i.value; });
    for(const empId in grouped){
      const emp = employees.find(e=>e.id===empId);
      if(!emp) continue;
      const dept = DEPARTMENTS[emp.department];
      const values = {};
      dept.fields.forEach(f=>{ values[f.key] = f.type==='number' ? (Number(grouped[empId][f.key])||0) : (grouped[empId][f.key]||''); });
      await saveKpiForMonth(editingMonth, empId, values);
    }
    render();
  };

  const savePinsBtn = document.getElementById('savePinsBtn');
  if(savePinsBtn) savePinsBtn.onclick = async ()=>{
    document.querySelectorAll('[data-nameemp]').forEach(i=>{
      const emp = employees.find(e=>e.id===i.dataset.nameemp);
      const val = i.value.trim();
      if(emp && val) emp.name = val;
    });
    document.querySelectorAll('[data-pinemp]').forEach(i=>{
      const emp = employees.find(e=>e.id===i.dataset.pinemp);
      if(emp && /^\d{4}$/.test(i.value.trim())) emp.pin = i.value.trim();
    });
    await storeSet('app:employees', employees, SHARED);
    render();
  };

  const addEmpBtn = document.getElementById('addEmpBtn');
  if(addEmpBtn) addEmpBtn.onclick = async ()=>{
    const name = document.getElementById('newEmpName').value.trim();
    const dept = document.getElementById('newEmpDept').value;
    const pin = document.getElementById('newEmpPin').value.trim();
    if(!name || !/^\d{4}$/.test(pin)){ alert('Укажите имя и 4-значный PIN'); return; }
    const id = 'e' + Date.now();
    await saveEmployee({id, name, department:dept, pin});
    render();
  };

  document.querySelectorAll('[data-delemp]').forEach(btn=>{
    btn.onclick = async ()=>{
      const emp = employees.find(e=>e.id===btn.dataset.delemp);
      if(!emp) return;
      if(!confirm('Удалить сотрудника «' + emp.name + '»? Его профиль исчезнет.')) return;
      employees = employees.filter(e=>e.id!==emp.id);
      await storeSet('app:employees', employees, SHARED);
      render();
    };
  });

  const changePinBtn = document.getElementById('changePinBtn');
  if(changePinBtn) changePinBtn.onclick = async ()=>{
    const val = document.getElementById('newAdminPin').value.trim();
    if(new RegExp('^\\d{'+ADMIN_PIN_LEN+'}$').test(val)){ await setAdminPin(val); render(); }
    else { alert('PIN должен состоять из ' + ADMIN_PIN_LEN + ' цифр'); }
  };

  const syncOpBtn = document.getElementById('syncOpBtn');
  if(syncOpBtn) syncOpBtn.onclick = async ()=>{
    sheetUrls.op = document.getElementById('sheetUrlOp').value.trim();
    await syncFromGoogleSheet('op');
  };
  const syncToBtn = document.getElementById('syncToBtn');
  if(syncToBtn) syncToBtn.onclick = async ()=>{
    sheetUrls.to = document.getElementById('sheetUrlTo').value.trim();
    await syncFromGoogleSheet('to');
  };
}

(async function init(){
  await loadAll();
  render();
  timerHandle = setInterval(()=>{ if(mode==='employee') render(); }, 60000);
  if((sheetUrls.op||'').trim() || (sheetUrls.to||'').trim()){
    silentAutoSync();
    setInterval(silentAutoSync, 5*60000);
  }
})();
</script>
</body>

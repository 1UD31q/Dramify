function parseCSV(text){
  const rows = []; let row = []; let field=''; let inQuotes=false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else inQuotes=false; }
      else field+=c;
    } else {
      if(c==='"') inQuotes=true;
      else if(c===','){ row.push(field); field=''; }
      else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else if(c==='\r'){ /* skip */ }
      else field+=c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r=> r.some(c=>c.trim()!==''));
}

function parseNum(s){
  if(s===null || s===undefined) return 0;
  let t = String(s).replace(/[^\d.,\-]/g,'');
  if(t==='') return 0;
  if(t.includes(',') && t.includes('.')){
    if(t.lastIndexOf(',') > t.lastIndexOf('.')){ t = t.replace(/\./g,'').replace(',', '.'); }
    else { t = t.replace(/,/g,''); }
  } else if(t.includes(',')){
    t = t.replace(',', '.');
  }
  const n = parseFloat(t);
  return isNaN(n) ? 0 : Math.round(n);
}

function toCsvUrl(url){
  url = (url||'').trim();
  const gidMatch = url.match(/gid=([0-9]+)/);
  const gid = gidMatch ? gidMatch[1] : '0';

  // Обычная ссылка на редактирование: .../spreadsheets/d/ID/edit...
  const editMatch = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)\/edit/);
  if(editMatch){
    return `https://docs.google.com/spreadsheets/d/${editMatch[1]}/export?format=csv&gid=${gid}`;
  }

  // Опубликованная ссылка (Файл → Опубликовать в интернете): .../spreadsheets/d/e/2PACX-.../pubhtml или /pub
  const pubMatch = url.match(/\/spreadsheets\/d\/e\/([a-zA-Z0-9-_]+)/);
  if(pubMatch){
    return `https://docs.google.com/spreadsheets/d/e/${pubMatch[1]}/pub?gid=${gid}&single=true&output=csv`;
  }

  // Уже готовая прямая ссылка (например, сразу с output=csv) — используем как есть
  return url;
}

// Проверка, относится ли строка таблицы к нужному месяцу по колонке даты.
// Если дата пустая — строка не отбрасывается (так было и раньше).
function rowInMonth(row, dateCol, targetMonth){
  if(dateCol<0) return true;
  const dateRaw = String(row[dateCol]||'').trim();
  const dm = dateRaw.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})/);
  if(dm){
    const mk = dm[3] + '-' + String(Number(dm[2])).padStart(2,'0');
    return mk === targetMonth;
  }
  return !dateRaw;
}

// ---------------------------------------------------------------------
// Трекер тенденции — не список сделок, а «дашборд»-таблица с готовыми
// подписанными ячейками (Цель месяца, Тенденция, Дата сегодня, Раб дней…).
// Ищем нужные значения по подписям, а не по фиксированным координатам,
// чтобы не сломаться при небольших правках макета таблицы.
function findLabelCell(grid, label){
  const target = label.toLowerCase();
  for(let r=0;r<grid.length;r++){
    for(let c=0;c<grid[r].length;c++){
      if((grid[r][c]||'').toLowerCase().trim().startsWith(target)) return {r,c};
    }
  }
  return null;
}

function parseTrackerGrid(grid){
  const result = {};

  const goalPos = findLabelCell(grid, 'цель месяца');
  if(goalPos) result.monthGoal = parseNum(grid[goalPos.r][goalPos.c+1]);

  // Блок: Дата сегодня | Месяц | Остаток дней | План | Сейчас сумма | Должно быть сейчас | Тенденция | Разница
  const todayPos = findLabelCell(grid, 'дата сегодня');
  if(todayPos){
    const headerRow = grid[todayPos.r].map(h=>(h||'').toLowerCase());
    const dataRow = grid[todayPos.r+1] || [];
    const col = (label)=> headerRow.findIndex(h=>h.includes(label));
    const get = (label)=>{ const i = col(label); return i>=0 ? dataRow[i] : ''; };
    result.dayToday = parseNum(get('дата сегодня'));
    result.daysLeft = parseNum(get('остаток дней'));
    result.plan = parseNum(get('план'));
    result.currentSum = parseNum(get('сейчас сумма'));
    result.shouldBeNow = parseNum(get('должно быть'));
    result.trendPct = parseNum(get('тенденция'));
    result.diff = parseNum(get('разница'));
  }

  // Блок: Сумма (сколько осталось) | Раб дней | В день нужно делать
  const workPos = findLabelCell(grid, 'раб дней');
  if(workPos){
    const headerRow = grid[workPos.r].map(h=>(h||'').toLowerCase());
    const dataRow = grid[workPos.r+1] || [];
    const col = (label)=> headerRow.findIndex(h=>h.includes(label));
    const get = (label)=>{ const i = col(label); return i>=0 ? dataRow[i] : ''; };
    result.remainingToPlan = parseNum(get('сумма'));
    result.workDaysLeft = parseNum(get('раб дней'));
    result.dailyTargetNeeded = parseNum(get('в день'));
  }

  const hasCore = result.plan>0 && (todayPos!==null);
  if(!hasCore) return null;

  const effectivePlan = result.monthGoal || result.plan;
  // Прогноз к концу месяца — берём готовый % тенденции из таблицы, а не считаем сами
  result.forecastTotal = effectivePlan>0 ? Math.round(effectivePlan * (result.trendPct/100)) : 0;
  result.forecastPct = result.trendPct;
  result.effectivePlan = effectivePlan;
  return result;
}

async function syncTracker(silent){
  const rawUrl = trackerUrl.trim();
  if(!rawUrl){ if(!silent){ trackerStatus = 'Сначала вставьте ссылку на трекер'; showToast(trackerStatus, 'error'); } return; }
  if(!silent){ trackerSyncing = true; trackerStatus = ''; render(); }
  try{
    const url = toCsvUrl(rawUrl);
    const text = await fetchCsvWithRetry(url);
    const rows = parseCSV(text);
    if(rows.length < 2) throw new Error('Таблица пустая или не найдена');
    const grid = rows.map(r=>r.map(c=>String(c||'').trim()));
    const parsed = parseTrackerGrid(grid);
    if(!parsed) throw new Error('Не нашёл нужные подписи в таблице (Цель месяца / Дата сегодня)');
    trackerData = parsed;
    await storeSet('app:trackerData', trackerData, SHARED);
    lastTrackerSyncAt = Date.now();
    if(!silent){ trackerStatus = 'Данные обновлены'; showToast(trackerStatus, 'success'); }
  } catch(err){
    const hint = /failed to fetch/i.test(err.message)
      ? ' — проверьте, что таблица опубликована (Файл → Поделиться → Опубликовать в интернете → формат CSV) и ссылка вставлена целиком'
      : '';
    if(!silent){ trackerStatus = 'Не получилось: ' + err.message + hint; showToast(trackerStatus, 'error'); }
  }
  if(!silent){ trackerSyncing = false; render(); }
  else if(mode==='employee'){ render(); }
}

// Публичный CSV-экспорт гугл-таблиц иногда отвечает ошибкой без видимой причины
// (не наша ошибка, а особенность самого Google) — поэтому пробуем ещё пару раз
// с небольшой паузой, прежде чем показать ошибку пользователю.
async function fetchCsvWithRetry(url, attempts){
  attempts = attempts || 3;
  let lastErr;
  for(let i=0;i<attempts;i++){
    try{
      const res = await fetch(url, {cache:'no-store'});
      if(!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      if(!text || !text.trim()) throw new Error('Пустой ответ');
      return text;
    }catch(err){
      lastErr = err;
      if(i<attempts-1) await new Promise(r=>setTimeout(r, 700*(i+1)));
    }
  }
  throw lastErr;
}

async function syncFromGoogleSheet(dept, targetMonth, silent){
  targetMonth = targetMonth || editingMonth;
  const rawUrl = (sheetUrls[dept]||'').trim();
  if(!rawUrl){ if(!silent) syncStatus[dept] = 'Сначала вставьте ссылку на таблицу'; return; }
  if(!silent){ syncing[dept] = true; syncStatus[dept] = ''; render(); }
  try{
    const url = toCsvUrl(rawUrl);
    const text = await fetchCsvWithRetry(url);
    const rows = parseCSV(text);
    if(rows.length < 2) throw new Error('Таблица пустая или не найдена');

    const header = rows[0].map(h=>h.trim());
    const hl = header.map(h=>h.toLowerCase());
    const findCol = (patterns)=> hl.findIndex(h=> patterns.some(p=>h.includes(p)));

    const sellerCol = findCol(['кто продал']);
    const doerCol = findCol(['кто делает']);
    const statusCol = findCol(['статус']);
    const grossCol = findCol(['сумма общая','сумма']);
    const netCol = findCol(['заработок']);
    const pendingCol = findCol(['остаток']);
    const dateCol = findCol(['дата оформления','дата']);
    const isRawLedger = sellerCol>=0 || doerCol>=0;

    ensureMonth(targetMonth);
    const deptEmployees = employees.filter(e=>e.department===dept);
    let matched = 0;

    const colLetter = (idx)=> idx<0 ? null : String.fromCharCode(65 + idx);
    const colInfo = (idx)=> idx<0 ? 'не найдена' : `«${header[idx]}» (кол. ${colLetter(idx)})`;

    if(isRawLedger){
      const actorCol = dept==='op' ? sellerCol : doerCol;
      if(actorCol<0) throw new Error('Не нашёл колонку «' + (dept==='op'?'Кто продал':'Кто делает') + '»');

      // Диагностика: какие колонки реально нашлись — чтобы можно было проверить,
      // не перепутала ли программа колонку, не открывая саму таблицу.
      const diag = {
        actorLabel: dept==='op' ? 'исполнитель (Кто продал)' : 'исполнитель (Кто делает)',
        actor: colInfo(actorCol),
        status: colInfo(statusCol),
        gross: colInfo(grossCol),
        pending: colInfo(pendingCol),
        date: colInfo(dateCol),
        totalRowsInSheet: rows.length-1,
      };

      // Касса компании считается напрямую по колонкам таблицы, по всей таблице целиком:
      // «Сумма общая» → грязная касса; «Сумма общая» при статусе «успешно завершено» → чистая;
      // готовая колонка «Остаток» → остаток (ещё войдёт). Ничего дополнительно не выводим.
      let ledgerGross = 0, ledgerNet = 0, ledgerPending = 0, ledgerCount = 0, ledgerUnmatched = 0;
      const unmatchedNames = new Set();
      for(let r=1;r<rows.length;r++){
        const row = rows[r];
        if(!rowInMonth(row, dateCol, targetMonth)) continue;
        const actor = (row[actorCol]||'').trim().toLowerCase();
        if(!actor || actor==='-' || actor==='—' || actor==='–' || actor==='n/a') continue; // строка вообще не про этот отдел (исполнитель не указан) — не считаем её сюда
        const statusText = statusCol>=0 ? (row[statusCol]||'').toLowerCase() : '';
        const isDone = statusText.includes('успешно');
        const grossVal = grossCol>=0 ? parseNum(row[grossCol]) : 0;
        const pendingVal = pendingCol>=0 ? parseNum(row[pendingCol]) : 0;
        ledgerGross += grossVal;
        if(isDone) ledgerNet += grossVal;
        ledgerPending += pendingVal;
        ledgerCount++;
        if(!deptEmployees.some(e=>e.name.trim().toLowerCase()===actor)){
          ledgerUnmatched++;
          if(unmatchedNames.size<5) unmatchedNames.add((row[actorCol]||'').trim());
        }
      }
      diag.rowsInMonth = ledgerCount;
      diag.unmatchedNames = Array.from(unmatchedNames);
      if(!ledgerTotals[targetMonth]) ledgerTotals[targetMonth] = {};
      ledgerTotals[targetMonth][dept] = {net: ledgerNet, pending: ledgerPending, gross: ledgerGross, count: ledgerCount, unmatched: ledgerUnmatched, diag};

      for(const emp of deptEmployees){
        const nameLc = emp.name.trim().toLowerCase();
        let orders=0, completed=0, netAmount=0, pending=0, revenue=0, deals=0, actualCash=0;
        for(let r=1;r<rows.length;r++){
          const row = rows[r];
          const actor = (row[actorCol]||'').trim().toLowerCase();
          if(actor !== nameLc) continue;
          if(!rowInMonth(row, dateCol, targetMonth)) continue;
          const statusText = statusCol>=0 ? (row[statusCol]||'').toLowerCase() : '';
          const isDone = statusText.includes('успешно');
          const grossVal = grossCol>=0 ? parseNum(row[grossCol]) : 0;
          if(dept==='to'){
            orders++;
            if(isDone){
              completed++;
              netAmount += grossVal; // чистая касса — «Сумма общая» только по успешно завершённым
            } else {
              pending += grossVal; // остаток — «Сумма общая» по НЕ завершённым (по статусу)
            }
          } else {
            deals++;
            revenue += grossVal; // выручка ОП — вся «Сумма общая», без учёта статуса
            if(isDone) actualCash += grossVal; // касса по факту — только успешно завершённые
          }
        }
        const values = getKpi(emp.id, targetMonth);
        if(dept==='to'){
          values.orders = orders; values.completed = completed; values.netAmount = netAmount;
          values.pending = pending; values.avgCheck = completed>0 ? Math.round(netAmount/completed) : 0;
        } else {
          values.deals = deals; values.revenue = revenue; values.actualCash = actualCash;
        }
        kpiData[targetMonth][emp.id] = values;
        if(orders>0 || deals>0) matched++;
      }

      // ---- Парсим активные заказы для блока «Текущие заказы» (только ТО) ----
      if(dept === 'to'){
        // Дополнительные колонки из таблицы
        const nameCol     = findCol(['имя','name']);
        const clientCol   = nameCol >= 0 ? nameCol : 0; // Имя клиента — первая колонка
        const deadlineCol = findCol(['дата сдачи','дедлайн','срок']);
        const payMethodCol= findCol(['метод оплаты','способ оплаты','оплата']);
        const prepayCol   = findCol(['предоплат']);
        const contactPlaceCol = findCol(['место общения','мессенджер','канал связи','платформа']);
        const notesCol    = findCol(['примечани','заметк']);
        const phoneCol    = findCol(['телефон','номер телефона','phone','номер для связи']);
        const durationCol = findCol(['\u0434\u043b\u0438\u0442\u0435\u043b\u044c\u043d\u043e\u0441\u0442']);

        const newOrdersData = {};
        for(const emp of deptEmployees){
          const nameLc = emp.name.trim().toLowerCase();
          const empOrders = [];
          for(let r=1;r<rows.length;r++){
            const row = rows[r];
            const actor = (row[actorCol]||'').trim().toLowerCase();
            if(actor !== nameLc) continue;
            // Берём все строки этого месяца
            if(!rowInMonth(row, dateCol, targetMonth)) continue;
            const statusRaw = statusCol>=0 ? (row[statusCol]||'').trim() : '';
            const isDone = statusRaw.toLowerCase().includes('успешно');
            const clientName = clientCol>=0 ? (row[clientCol]||'').trim() : '';
            const grossVal   = grossCol>=0  ? parseNum(row[grossCol])  : 0;
            const pendingVal = pendingCol>=0 ? parseNum(row[pendingCol]): 0;
            const prepayVal  = prepayCol>=0  ? parseNum(row[prepayCol]) : 0;
            const deadlineStr= deadlineCol>=0 ? (row[deadlineCol]||'').trim() : '';
            const payMethod  = payMethodCol>=0 ? (row[payMethodCol]||'').trim() : '';
            const dateCreated= dateCol>=0 ? (row[dateCol]||'').trim() : '';
            const contactPlace = contactPlaceCol>=0 ? (row[contactPlaceCol]||'').trim() : '';
            const notes      = notesCol>=0 ? (row[notesCol]||'').trim() : '';
            const phone      = phoneCol>=0 ? (row[phoneCol]||'').trim() : '';
            const duration   = durationCol>=0 ? (row[durationCol]||'').trim() : '';

            // Уникальный ID заказа: строка в таблице (r) + имя клиента
            const orderId = `r${r}-${emp.id}`;

            // statusSince: берём из существующего ordersData если статус не изменился,
            // иначе — сейчас (точное время неизвестно из CSV)
            const existing = (ordersData[emp.id]||[]).find(o=>o.id===orderId);
            const statusSince = (existing && existing.status === statusRaw)
              ? existing.statusSince
              : Date.now();

            empOrders.push({
              id: orderId,
              client: clientName,
              status: statusRaw,
              statusSince,
              gross: grossVal,
              pending: pendingVal,
              prepay: prepayVal,
              payMethod,
              deadline: deadlineStr,
              dateCreated,
              isDone,
              contactPlace,
              notes,
              phone,
              duration,
            });
          }
          newOrdersData[emp.id] = empOrders;
        }
        // Мёрджим: обновляем ordersData данными из CSV
        Object.assign(ordersData, newOrdersData);
        await storeSet('app:ordersData', ordersData, SHARED);
      }



    } else {
      const nameIdx = header.findIndex(h=>/имя|name/i.test(h));
      const idx = nameIdx>=0 ? nameIdx : 0;
      const fieldCols = {};
      DEPARTMENTS[dept].fields.filter(f=>!f.computed).forEach(f=>{
        const colIndex = header.findIndex((h,ci)=>{
          if(ci===idx) return false;
          const hlow = h.toLowerCase();
          const m = f.match.some(mm=>hlow.includes(mm));
          const ex = (f.exclude||[]).some(mm=>hlow.includes(mm));
          return m && !ex;
        });
        if(colIndex>=0) fieldCols[f.key] = colIndex;
      });
      for(let r=1;r<rows.length;r++){
        const row = rows[r];
        const name = (row[idx]||'').trim();
        if(!name) continue;
        const emp = deptEmployees.find(e=>e.name.trim().toLowerCase()===name.toLowerCase());
        if(!emp) continue;
        const values = getKpi(emp.id, targetMonth);
        Object.keys(fieldCols).forEach(fk=>{
          const raw = row[fieldCols[fk]];
          const fieldDef = DEPARTMENTS[dept].fields.find(f=>f.key===fk);
          values[fk] = fieldDef.type==='number' ? parseNum(raw) : (raw||'').trim();
        });
        kpiData[targetMonth][emp.id] = values;
        matched++;
      }
    }

    // ---- Парсим активные заказы для блока «Текущие заказы» (ОП) ----
    // Логика идентична ТО: перебираем сотрудников ОП, для каждого ищем строки
    // где «Кто продал» (sellerCol) совпадает с именем сотрудника
    if(dept === 'op'){
      // sellerCol уже объявлен выше: findCol(['кто продал'])
      // Дополнительные колонки
      const opClientCol      = findCol(['имя','name']);
      const opClientColFinal = opClientCol >= 0 ? opClientCol : 0;
      const opContactCol     = findCol(['место общения','примечани','платформа','мессенджер','канал']);
      const opPhoneCol       = findCol(['номер для связи','телефон','номер телефона','phone']);
      const opPrepayCol      = findCol(['предоплат']);
      const opToWorkerCol    = findCol(['кто делает']);
      const opDurationCol    = findCol(['длительност']);
      const opPayMethodCol   = findCol(['метод оплаты','способ оплаты','оплата']);
      const opEarningCol     = findCol(['заработок']);
      const opDeadlineCol    = findCol(['дата сдачи','дедлайн','срок']);

      const newOrdersData = {};
      for(const emp of deptEmployees){
        const nameLc = emp.name.trim().replace(/\.+$/, '').toLowerCase();
        const empOrders = [];
        for(let r=1; r<rows.length; r++){
          const row = rows[r];
          // Фильтр по колонке «Кто продал» — точно как ТО делает по «Кто делает»
          const actor = (row[sellerCol]||'').trim().replace(/\.+$/, '').toLowerCase();
          if(actor !== nameLc) continue;
          // Фильтр по месяцу (dateCol = «Дата оформления», объявлен выше)
          if(!rowInMonth(row, dateCol, targetMonth)) continue;

          const statusRaw   = statusCol>=0      ? (row[statusCol]||'').trim()         : '';
          const clientName  =                     (row[opClientColFinal]||'').trim();
          const grossVal    = grossCol>=0       ? parseNum(row[grossCol])               : 0;
          const prepayVal   = opPrepayCol>=0    ? parseNum(row[opPrepayCol])            : 0;
          const pendingVal  = pendingCol>=0     ? parseNum(row[pendingCol])             : 0;
          const toWorker    = opToWorkerCol>=0  ? (row[opToWorkerCol]||'').trim()      : '';
          const duration    = opDurationCol>=0  ? (row[opDurationCol]||'').trim()      : '';
          const payMethod   = opPayMethodCol>=0 ? (row[opPayMethodCol]||'').trim()     : '';
          const deadlineStr = opDeadlineCol>=0  ? (row[opDeadlineCol]||'').trim()      : '';
          const earning     = opEarningCol>=0   ? parseNum(row[opEarningCol])           : 0;
          const contactPlace= opContactCol>=0   ? (row[opContactCol]||'').trim()       : '';
          const phone       = opPhoneCol>=0     ? (row[opPhoneCol]||'').trim()         : '';
          const dateCreated = dateCol>=0        ? (row[dateCol]||'').trim()            : '';

          const orderId = `r${r}-${emp.id}`;
          const existing = (ordersData[emp.id]||[]).find(o=>o.id===orderId);
          const statusSince = (existing && existing.status === statusRaw)
            ? existing.statusSince : Date.now();

          empOrders.push({
            id: orderId,
            client: clientName,
            status: statusRaw,
            statusSince,
            gross: grossVal,
            prepay: prepayVal,
            pending: pendingVal,
            toWorker,
            duration,
            payMethod,
            deadline: deadlineStr,
            earning,
            contactPlace,
            phone,
            dateCreated,
            isDone: statusRaw.toLowerCase().includes('успешно'),
          });
        }
        newOrdersData[emp.id] = empOrders;
      }
      Object.assign(ordersData, newOrdersData);
      await storeSet('app:ordersData', ordersData, SHARED);
    }

    await storeSet('app:kpiData', kpiData, SHARED);
    await storeSet('app:sheetUrls', sheetUrls, SHARED);
    await storeSet('app:ledgerTotals', ledgerTotals, SHARED);
    lastSheetSyncAt[dept] = Date.now();
    if(!silent){
      const lt = ledgerTotals[targetMonth] && ledgerTotals[targetMonth][dept];
      const sampleNames = (lt && lt.diag && lt.diag.unmatchedNames && lt.diag.unmatchedNames.length)
        ? ` Например: ${lt.diag.unmatchedNames.map(n=>'«'+n+'»').join(', ')}.`
        : '';
      const unmatchedNote = (lt && lt.unmatched>0) ? ` (${lt.unmatched} строк не сопоставлено с сотрудниками — на кассу компании это не влияет.${sampleNames})` : '';
      syncStatus[dept] = matched>0
        ? `Обновлено ${matched} из ${deptEmployees.length} сотрудников${unmatchedNote}`
        : 'Никто не найден — проверьте, что имена в таблице совпадают с именами в приложении' + unmatchedNote;
      showToast(syncStatus[dept], matched>0 ? 'success' : 'error');
    }
  } catch(err){
    const hint = /failed to fetch/i.test(err.message)
      ? ' — проверьте, что таблица опубликована (Файл → Поделиться → Опубликовать в интернете → формат CSV) и ссылка вставлена целиком'
      : '';
    if(!silent){ syncStatus[dept] = 'Не получилось: ' + err.message + hint; showToast(syncStatus[dept], 'error'); }
  }
  if(!silent){ syncing[dept] = false; render(); }
  else if(mode==='employee'){ render(); }
}

function escapeHtml(str){
  return String(str==null?'':str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

let mainEl = null; // элемент #main кэшируется один раз, а не ищется на каждый чих
let lastViewKey = null; // сигнатура текущего «экрана» — нужна, чтобы не переигрывать анимацию появления по каждому чиху

function currentViewKey(){
  // Ключ отражает только то, какой ЭКРАН показан, а не что на нём меняется
  // (ввод PIN, ввод KPI и т.п.) — иначе анимация появления будет
  // переигрываться на каждое нажатие клавиши и выглядеть как тряска.
  if(mode==='employee'){
    if(myEmployeeId) return 'emp-dashboard:'+myEmployeeId;
    if(selectingEmpId) return 'emp-pingate';
    return 'emp-list';
  }
  return adminUnlocked ? 'admin-view' : 'admin-pingate';
}

function render(){
  const main = mainEl || (mainEl = document.getElementById('main'));
  if(!main) return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.mode===mode));
  window.scrollTo({top:0,behavior:'smooth'});
  main.classList.remove('anim-in'); // сначала снимаем класс — иначе только что вставленные карточки
                                     // унаследуют его и будут переигрывать анимацию на каждый рендер
  // Показываем вкладку «Продажа» только для сотрудников ОП
  const salesTabEl = document.getElementById('salesTab');
  if(salesTabEl){
    const emp = employees.find(e=>e.id===myEmployeeId);
    salesTabEl.style.display = (emp && emp.department==='op') ? '' : 'none';
  }
  if(mode==='employee')       main.innerHTML = renderEmployeeArea();
  else if(mode==='sales')     main.innerHTML = renderSalesView();
  else                         main.innerHTML = renderAdminView();
  // анимацию «появления» включаем только когда реально сменился экран, а не на каждый рендер
  // (иначе ввод PIN или KPI подёргивался бы при каждой цифре/символе)
  const viewKey = currentViewKey();
  if(viewKey !== lastViewKey){
    void main.offsetWidth; // форс reflow, чтобы браузер применил анимацию как «свежее» появление
    main.classList.add('anim-in');
    lastViewKey = viewKey;
  }
  // обработчики событий навешаны один раз через делегирование (см. attachDelegatedHandlers),
  // поэтому после каждого render() их не нужно перевешивать заново — это и есть оптимизация
}

// Раз в минуту сотруднику нужно обновить только часы и счётчик отработанного
// времени — раньше для этого пересобирался весь DOM целиком через render().
// Точечное обновление textContent конкретных узлов дешевле и не мигает.
function tickEmployeeClock(){
  if(mode!=='employee' || !myEmployeeId) return;
  const clockEl = document.getElementById('punchClock');
  const elapsedEl = document.getElementById('elapsedText');
  if(!clockEl || !elapsedEl){ render(); return; } // структура не найдена — подстрахуемся полным рендером
  clockEl.textContent = fmtTime(Date.now());
  elapsedEl.textContent = fmtDuration(todayHoursFor(myEmployeeId));
}

function renderEmployeeArea(){

// Инициалы считаются один раз на сотрудника и кэшируются на самом объекте —
// раньше split/join выполнялись заново при каждом render(), даже если имя не менялось.
function initialsFor(e){
  if(e._initials && e._initialsSrc === e.name) return e._initials;
  e._initials = e.name.trim().split(/\s+/).filter(Boolean).map(p=>p[0]).slice(0,2).join('').toUpperCase() || '?';
  e._initialsSrc = e.name;
  return e._initials;
}

function renderEmployeeDashboard(){
  const emp = employees.find(e=>e.id===myEmployeeId);
  if(!emp){ myEmployeeId = null; return renderEmployeeList(); }
  const dept = DEPARTMENTS[emp.department];
  const checkedIn = isCheckedIn(emp.id);
  const todays = logs.filter(l=>l.empId===emp.id && isToday(l.ts)).sort((a,b)=>a.ts-b.ts);
  const k = getKpi(emp.id, activeMonth);
  const autoPlan = planShareFor(emp.department);
  const num = Number(k[dept.ratio.num])||0;
  const den = (dept.ratio.den==='plan' && autoPlan!=null) ? autoPlan : (Number(k[dept.ratio.den])||0);
  const ratioPct = den>0 ? Math.min(100, Math.round(num/den*100)) : 0;

  const kpiBoxes = dept.fields.map(f=>{
    let val = k[f.key];
    if(f.computed && f.key==='avgCheck' && emp.department==='op'){
      val = (Number(k.deals)>0) ? (Number(k.revenue)/Number(k.deals)) : 0;
    }
    if(f.key==='plan' && autoPlan!=null) val = autoPlan;
    const display = f.type==='number' ? (f.money ? fmtMoney(val) : val) : (escapeHtml(val) || '—');
    const wideClass = (f.key==='avgCheck' && emp.department==='op') ? ' wide' : '';
    return `<div class="kpi-box${wideClass}"><div class="label">${f.label}</div><div class="value">${display}</div></div>`;
  }).join('');

  return `
    <div class="card">
      <div class="punch-wrap">
        <div class="status-pill"><span class="dot ${checkedIn?'in':'out'}"></span>${escapeHtml(emp.name)} · ${checkedIn?'на смене':'не на смене'}</div>
        <div class="punch-ring ${checkedIn?'on-shift':''}">
          <button class="punch-btn ${checkedIn?'ready-out':'ready-in'}" id="punchBtn">
            ${checkedIn?'END':'START'}
            <span class="sub" id="punchClock">${fmtTime(Date.now())}</span>
          </button>
        </div>
        <div class="elapsed">Сегодня отработано: <span id="elapsedText">${fmtDuration(todayHoursFor(emp.id))}</span></div>
        <div class="switch-user" id="switchUser">Это не я</div>
      </div>
    </div>

    <div class="card">
      <h2>KPI · ${monthLabel(activeMonth)}</h2>
      <div class="kpi-grid">${kpiBoxes}</div>
      <div class="plan-bar-wrap">
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);"><span>${dept.ratio.label}</span><span>${ratioPct}%</span></div>
        <div class="plan-bar-track"><div class="plan-bar-fill" style="width:${ratioPct}%"></div></div>
      </div>
    </div>

    <div class="card">
      <h2>Мои отметки сегодня</h2>
      ${todays.length===0 ? '<div class="empty">Пока нет отметок</div>' :
        todays.map(l=>`<div class="log-row"><span class="log-type ${l.type}">${l.type==='in'?'Приход':'Уход'}</span><span class="mono">${fmtTime(l.ts)}</span></div>`).join('')}
    </div>

    ${emp.department === 'to' ? renderOrdersBlock(emp.id) : ''}
    ${emp.department === 'op' ? renderOrdersBlockOP(emp.id) : ''}

    <div class="card">
      <h2>Мой график · ${monthLabel(activeMonth)}</h2>
      ${renderCalendarGrid(emp.id, activeMonth, false)}
      <div class="cal-legend">
        <span><span class="sw work"></span>Рабочий день</span>
        <span><span class="sw off"></span>Выходной</span>
        <span><span class="sw today"></span>Сегодня</span>

}

  `;

async function submitSalesForm(){
  if(salesSubmitting) return;
  const url = salesScriptUrl.trim();
  if(!url){ showToast('Не указан URL скрипта отчёта (Админ → Отчёт продаж)','error'); return; }

  // Читаем поля формы
  const get = id => {
    const el = document.getElementById(id);
    return el ? el.value.trim() : '';
  };
  salesForm.clientName   = get('sf_clientName');
  salesForm.date         = get('sf_date');
  salesForm.target       = get('sf_target');
  salesForm.source       = get('sf_source');
  salesForm.phone        = get('sf_phone');
  salesForm.total        = get('sf_total');
  salesForm.prepayment   = get('sf_prepayment');
  salesForm.duration     = get('sf_duration');
  salesForm.durationCustom = get('sf_duration_custom');
  salesForm.addon        = get('sf_addon');
  salesForm.addonCustom  = get('sf_addon_custom');
  salesForm.payMethod    = get('sf_payMethod');
  salesForm.earnings     = get('sf_earnings');
  salesForm.deliveryDate = get('sf_deliveryDate');
  salesForm.sheetMonth   = get('sf_sheetMonth');

  // Финальная длительность: если "Другое" — берём кастомное значение
  const durationFinal = salesForm.duration === 'Другое'
    ? (salesForm.durationCustom || 'Другое')
    : salesForm.duration;
  // Доп. услуга
  const addonFinal = salesForm.addon === 'Другое'
    ? (salesForm.addonCustom || '')
    : salesForm.addon;
  // Склеиваем: "2,5 мин+Диктор" или просто "2,5 мин"
  const durationFull = addonFinal ? durationFinal + addonFinal : durationFinal;

  if(!salesForm.clientName){ showToast('Введите имя клиента','error'); return; }
  if(!salesForm.total){ showToast('Введите сумму','error'); return; }

  const total  = parseFloat(salesForm.total)||0;
  const prep   = parseFloat(salesForm.prepayment)||0;
  const remain = Math.max(0, total - prep);
  const empName = salesEmpName();

  const payload = {
    clientName:   salesForm.clientName,
    date:         salesForm.date,
    target:       salesForm.target,
    source:       salesForm.source,
    phone:        salesForm.phone,
    total:        total,
    prepayment:   prep,
    remainder:    remain,
    whoSold:      empName,
    status:       'Взять в работу',
    duration:     durationFull,
    payMethod:    salesForm.payMethod,
    earnings:     parseFloat(salesForm.earnings)||0,
    deliveryDate: salesForm.deliveryDate,
    sheetMonth:   salesForm.sheetMonth,
  };

  salesSubmitting = true;
  salesResult = '';
  render();

  try{
    const resp = await fetch(url, {
      method:'POST',
      body: JSON.stringify(payload),
      // Content-Type не указываем — GAS блокирует preflight CORS для application/json
    });
    const text = await resp.text();
    // GAS Web App может вернуть JSON или просто 'ok'
    let ok = resp.ok;
    try{ const j = JSON.parse(text); if(j && j.status) ok = j.status==='ok'; } catch(e){}
    if(ok){
      salesResult = 'ok';
      salesResultMsg = 'Запись добавлена в отчёт!';
      // Показываем TG-уведомление
      showTgNotif(payload);
      // Сброс формы (кроме таргета и метода оплаты)
      salesForm = {
        clientName:'', date: new Date().toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\./g,'.'),
        target: salesForm.target, source:'', phone:'', total:'', prepayment:'',
        duration: salesForm.duration, durationCustom:'',
        addon:'', addonCustom:'',
        payMethod: salesForm.payMethod, earnings:'', deliveryDate:'',
        sheetMonth: salesForm.sheetMonth,
      };
    } else {
      salesResult = 'err';
      salesResultMsg = 'Ошибка: ' + (text||resp.statusText||'неизвестная ошибка');
    }
  } catch(e){
    salesResult = 'err';
    salesResultMsg = 'Не удалось отправить: ' + e.message;
  }
  salesSubmitting = false;
  render();
}

function renderAdminView(){

    const checkedIn = isCheckedIn(e.id);
    const last = lastLogFor(e.id);
    return `<tr>
      <td>${escapeHtml(e.name)}</td>
      <td><span class="status-dot" style="background:${checkedIn?'#1F6F63':'#9AA5A8'}"></span>${checkedIn?'На смене':'Не на смене'}</td>
      <td class="mono">${fmtDuration(todayHoursFor(e.id))}</td>
      <td class="mono">${last? fmtDateTime(last.ts):'—'}</td>
    </tr>`;
  }).join('');

  const monthOptions = Object.keys(kpiData).sort().reverse().map(mk=>
    `<option value="${mk}" ${mk===editingMonth?'selected':''}>${monthLabel(mk)}${mk===activeMonth?' (активный)':''}</option>`
  ).join('');

  ensureMonth(editingMonth);
  const groups = {};
  employees.forEach(e=>{ (groups[e.department]=groups[e.department]||[]).push(e); });

  let kpiEditor = '';
  Object.keys(groups).forEach(dept=>{
    kpiEditor += `<div class="dept-group-title">${DEPARTMENTS[dept].label}</div>`;
    groups[dept].forEach(e=>{
      const k = getKpi(e.id, editingMonth);
      const autoPlan = planShareFor(dept);
      kpiEditor += `<div class="emp-edit-block">
        <div class="emp-edit-name">${escapeHtml(e.name)}</div>
        <div class="field-grid">
          ${DEPARTMENTS[dept].fields.filter(f=>!f.computed).map(f=>{
            if(f.key==='plan' && autoPlan!=null){
              return `<div class="field-item">
                <label>${f.label} <span style="font-weight:400;color:var(--muted);">(авто, поровну по трекеру)</span></label>

            return `
            <div class="field-item">
              <label>${f.label}</label>
              <input type="${f.type}" ${f.type==='number'?'min="0" step="any"':''} data-emp="${e.id}" data-field="${f.key}" value="${escapeHtml(k[f.key])}">
            </div>

          }).join('')}

    });

  const logLine = (l)=>{
    const emp = employees.find(e=>e.id===l.empId);
    return `<div class="log-row"><span>${emp?escapeHtml(emp.name):'—'} · <span class="log-type ${l.type}">${l.type==='in'?'приход':'уход'}</span></span><span class="mono">${fmtDateTime(l.ts)}</span></div>`;
  };
  const todayLogs = logs.filter(l=>isToday(l.ts)).sort((a,b)=>b.ts-a.ts);
  const olderLogs = logs.filter(l=>!isToday(l.ts)).sort((a,b)=>b.ts-a.ts);

  const olderLogRows = olderLogs.map(logLine).join('');

  const finance = companyFinance(editingMonth);
  const projection = monthEndProjection(editingMonth, finance.netCash, finance.totalPlan);

    <div class="card">
      <h2 style="display:flex;justify-content:space-between;align-items:center;">

        <button class="btn small" id="saveSalesScriptBtn">Сохранить</button>

    </div>

    <div class="card">
      <h2>KPI сотрудников · ${monthLabel(editingMonth)}</h2>

    <div class="card">
      <h2>Сотрудники и PIN</h2>
      ${employees.map(e=>`
        <div class="row" style="margin-top:8px;">
          <input type="text" data-nameemp="${e.id}" value="${escapeHtml(e.name)}" style="flex:2;">
          <input type="text" data-pinemp="${e.id}" value="${escapeHtml(e.pin)}" maxlength="4" placeholder="PIN">
          <button class="btn danger small" data-delemp="${e.id}" style="flex:none;">Удалить</button>
        </div>`).join('')}
      <button class="btn small" id="savePinsBtn" style="margin-top:6px;">Сохранить</button>

    <div class="card">
      <h2>Добавить сотрудника</h2>
      <div class="row">
        <input type="text" id="newEmpName" placeholder="Имя">
        <select id="newEmpDept">
          <option value="op">ОП</option>
          <option value="to">ТО</option>
        </select>
      </div>
      <div class="row">
        <input type="text" id="newEmpPin" placeholder="PIN (4 цифры)" maxlength="4">
        <button class="btn small" id="addEmpBtn">Добавить</button>
      </div>
    </div>

    <div class="card">
      <h2>Журнал посещений · сегодня</h2>
      ${todayLogRows.length===0? '<div class="empty">Логов пока нет</div>' : todayLogRows}
    </div>

    <div class="card">
      <h2 id="toggleLogsBtn" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center;">
        <span>Общий журнал (${olderLogs.length})</span>
        <span class="mono" style="color:var(--teal);letter-spacing:0;text-transform:none;font-size:12px;">${logsExpanded?'Свернуть ▲':'Показать ▾'}</span>
      </h2>
      ${logsExpanded ? `<div style="max-height:360px;overflow-y:auto;">${olderLogRows.length===0? '<div class="empty">Логов пока нет</div>' : olderLogRows}</div>` : ''}
    </div>

    <div class="card">
      <h2>PIN администратора</h2>
      <div class="row">
        <input type="text" id="newAdminPin" placeholder="Новый PIN (${ADMIN_PIN_LEN} цифр)" maxlength="${ADMIN_PIN_LEN}">
        <button class="btn small" id="changePinBtn">Изменить</button>

  `;

// ---------------------------------------------------------------------
// Делегирование событий: раньше на каждый render() заново вешались
// обработчики на все найденные элементы (querySelectorAll + forEach).
// При росте списка сотрудников/логов это лишняя работа на каждый чих —
// клик по вкладке, ввод PIN-кода, тик таймера раз в минуту и т.д.
// Здесь обработчики навешиваются ОДИН РАЗ на весь документ и определяют
// нужное действие по клику через closest(), что дешевле и не требует
// повторного прохода по DOM после каждого render().
// ---------------------------------------------------------------------

let asyncActionInFlight = false;
async function runOnce(fn){
  if(asyncActionInFlight) return;
  asyncActionInFlight = true;
  try { await fn(); } finally { asyncActionInFlight = false; }
}

function attachDelegatedHandlers(){
  document.addEventListener('click', async (ev)=>{
    const el = ev.target;

    const tab = el.closest('.tab');
    if(tab){ mode = tab.dataset.mode; render(); return; }

    const pickBtn = el.closest('[data-pick]');
    if(pickBtn){ selectingEmpId = pickBtn.dataset.pick; empPinInput=''; empPinError=''; render(); return; }

    if(el.closest('#backToList')){ selectingEmpId = null; render(); return; }

    const empKeyBtn = el.closest('.keypad button[data-empkey]');
    if(empKeyBtn){
      const k = empKeyBtn.dataset.empkey;
      if(k==='⌫'){ empPinInput = empPinInput.slice(0,-1); empPinError=''; }
      else if(empPinInput.length<EMP_PIN_LEN){ empPinInput += k; empPinError=''; }
      if(empPinInput.length===EMP_PIN_LEN){
        const emp = employees.find(e=>e.id===selectingEmpId);
        if(emp && empPinInput===emp.pin){
          myEmployeeId = emp.id;
          await storeSet('app:myEmployeeId', emp.id, false);
          selectingEmpId = null; empPinInput='';
        } else { empPinError = 'Неверный PIN'; empPinInput=''; }
      }
      render();
      return;
    }

    const keyBtn = el.closest('.keypad button[data-key]');
    if(keyBtn){
      const k = keyBtn.dataset.key;
      if(k==='⌫'){ pinInput = pinInput.slice(0,-1); pinError=''; }
      else if(pinInput.length<ADMIN_PIN_LEN){ pinInput += k; pinError=''; }
      if(pinInput.length===ADMIN_PIN_LEN){
        if(pinInput===adminPin){ adminUnlocked=true; pinInput=''; }
        else { pinError='Неверный PIN'; pinInput=''; }
      }
      render();
      return;
    }

    if(el.closest('#punchBtn')){ await runOnce(()=>punch(myEmployeeId)); return; }

    if(el.closest('#switchUser')){
      myEmployeeId=null; await storeSet('app:myEmployeeId', null, false); render(); return;
    }

    if(el.closest('#lockAdminBtn')){ adminUnlocked = false; render(); return; }

    if(el.closest('#addMonthBtn')){
      const now = new Date();
      const next = new Date(now.getFullYear(), now.getMonth()+1, 1);
      const suggested = next.getFullYear() + '-' + String(next.getMonth()+1).padStart(2,'0');
      const val = prompt('Новый месяц в формате ГГГГ-ММ:', suggested);
      if(val) addMonth(val.trim());
      return;
    }

    if(el.closest('#activateBtn')){ activateMonth(editingMonth); return; }

    if(el.closest('#toggleLogsBtn')){ logsExpanded = !logsExpanded; render(); return; }

    if(el.closest('#saveKpiBtn')){
      await runOnce(async ()=>{
        const inputs = document.querySelectorAll('[data-emp]');
        const grouped = {};
        inputs.forEach(i=>{ grouped[i.dataset.emp] = grouped[i.dataset.emp] || {}; grouped[i.dataset.emp][i.dataset.field] = i.value; });
        for(const empId in grouped){
          const emp = employees.find(e=>e.id===empId);
          if(!emp) continue;
          const dept = DEPARTMENTS[emp.department];
          const values = {};
          dept.fields.forEach(f=>{
            if(f.computed) return;
            values[f.key] = f.type==='number' ? (Number(grouped[empId][f.key])||0) : (grouped[empId][f.key]||'');
          });
          await saveKpiForMonth(editingMonth, empId, values);
        }
        render();
      });
      return;
    }

    if(el.closest('#savePinsBtn')){
      await runOnce(async ()=>{
        document.querySelectorAll('[data-nameemp]').forEach(i=>{
          const emp = employees.find(e=>e.id===i.dataset.nameemp);
          const val = i.value.trim();
          if(emp && val) emp.name = val;
        });
        document.querySelectorAll('[data-pinemp]').forEach(i=>{
          const emp = employees.find(e=>e.id===i.dataset.pinemp);
          if(emp && /^\d{4}$/.test(i.value.trim())) emp.pin = i.value.trim();
        });
        await storeSet('app:employees', employees, SHARED);
        render();
      });
      return;
    }

    if(el.closest('#addEmpBtn')){
      await runOnce(async ()=>{
        const name = document.getElementById('newEmpName').value.trim();
        const dept = document.getElementById('newEmpDept').value;
        const pin = document.getElementById('newEmpPin').value.trim();
        if(!name || !/^\d{4}$/.test(pin)){ showToast('Укажите имя и 4-значный PIN', 'error'); return; }
        const id = 'e' + Date.now();
        await saveEmployee({id, name, department:dept, pin});
        render();
      });
      return;
    }

    const delBtn = el.closest('[data-delemp]');
    if(delBtn){
      const emp = employees.find(e=>e.id===delBtn.dataset.delemp);
      if(!emp) return;
      const ok = await showConfirm('Удалить сотрудника?', `«${emp.name}» и его профиль исчезнут из приложения. Это действие нельзя отменить.`, 'Удалить');
      if(!ok) return;
      await runOnce(async ()=>{
        employees = employees.filter(e=>e.id!==emp.id);
        await storeSet('app:employees', employees, SHARED);
        render();
        showToast('Сотрудник удалён', 'success');
      });
      return;
    }

    if(el.closest('#changePinBtn')){
      const val = document.getElementById('newAdminPin').value.trim();
      if(new RegExp('^\\d{'+ADMIN_PIN_LEN+'}$').test(val)){ await setAdminPin(val); render(); showToast('PIN администратора обновлён', 'success'); }
      else { showToast('PIN должен состоять из ' + ADMIN_PIN_LEN + ' цифр', 'error'); }
      return;
    }

    const calCell = el.closest('[data-caltoggle]');
    if(calCell){
      await runOnce(async ()=>{
        await toggleOffDay(calCell.dataset.caltoggle, calCell.dataset.calmonth, calCell.dataset.calday);
        render();
      });
      return;
    }

    if(el.closest('#syncOpBtn')){
      sheetUrls.op = document.getElementById('sheetUrlOp').value.trim();
      await syncFromGoogleSheet('op');
      return;
    }
    if(el.closest('#syncToBtn')){
      sheetUrls.to = document.getElementById('sheetUrlTo').value.trim();
      await syncFromGoogleSheet('to');
      return;
    }
    if(el.closest('#syncTrackerBtn')){
      trackerUrl = document.getElementById('trackerUrlInput').value.trim();
      await storeSet('app:trackerUrl', trackerUrl, SHARED);
      await syncTracker();
      return;
    }

    // ---- Отчёт продаж: сохранить URL скрипта ----
    if(el.closest('#saveSalesScriptBtn')){
      const inp = document.getElementById('salesScriptUrlInput');
      if(inp){ salesScriptUrl = inp.value.trim(); await storeSet('app:salesScriptUrl', salesScriptUrl, SHARED); showToast('URL скрипта сохранён','success'); render(); }
      return;
    }

    // ---- Форма продажи: отправить ----
    if(el.closest('#salesSubmitBtn')){ await submitSalesForm(); return; }

    // ---- Заказы: сворачивание/разворачивание секции ----
    const toggleSec = el.closest('[data-orders-toggle]');
    if(toggleSec){
      const secId = toggleSec.dataset.ordersToggle;
      ordersCollapsed[secId] = !ordersCollapsed[secId];
      // Мгновенно обновляем DOM без полного рендера
      toggleSec.classList.toggle('collapsed', ordersCollapsed[secId]);
      const body = document.getElementById('orders-sec-body-' + secId);
      if(body) body.style.display = ordersCollapsed[secId] ? 'none' : '';
      return;
    }

    // ---- Заказы: поставить на паузу ----
    const pauseBtn = el.closest('[data-order-pause]');
    if(pauseBtn){
      const orderId = pauseBtn.dataset.orderPause;
      const empId   = pauseBtn.dataset.empId;
      const reason  = await showPauseModal(empId, orderId);
      if(!reason) return;
      if(!ordersOverlay[orderId]) ordersOverlay[orderId] = {};
      ordersOverlay[orderId].paused      = true;
      ordersOverlay[orderId].pauseReason = reason;
      ordersOverlay[orderId].pausedAt    = Date.now();
      // сохраняем statusSince для корректного таймера
      const empListP = ordersData[empId] || [];
      const ordP = empListP.find(o => o.id === orderId);
      if(ordP && !ordersOverlay[orderId].statusSince) ordersOverlay[orderId].statusSince = ordP.statusSince;
      await saveOverlay();
      render();
      showToast('Заказ на паузе: ' + reason, 'success');
      return;
    }

    // ---- Заказы: возобновить ----
    const resumeBtn = el.closest('[data-order-resume]');
    if(resumeBtn){
      const orderId = resumeBtn.dataset.orderResume;
      const empId   = resumeBtn.dataset.empId;
      const ov = ordersOverlay[orderId] || {};
      const empListR = ordersData[empId] || [];
      const ordR = empListR.find(o => o.id === orderId);
      const baseSince = ordR ? (ordR.statusSince||Date.now()) : Date.now();
      const pausedDuration = ov.pausedAt ? (ov.pausedAt - baseSince) : 0;
      ordersOverlay[orderId] = Object.assign(ov, {
        paused: false,
        pauseReason: '',
        pausedAt: null,
        statusSince: Date.now() - pausedDuration,
      });
      await saveOverlay();
      render();
      showToast('Заказ возобновлён', 'success');
      return;
    }

    // ---- Заказы: сменить статус ----
    const statusBtn = el.closest('[data-order-status]');
    if(statusBtn){
      const orderId = statusBtn.dataset.orderStatus;
      const empId   = statusBtn.dataset.empId;
      const empListS = ordersData[empId] || [];
      const ordS = empListS.find(o => o.id === orderId);
      const curStatus = (ordersOverlay[orderId]||{}).status || (ordS||{}).status || '';
      const newStatus = await showStatusModal(curStatus);
      if(!newStatus || newStatus === curStatus) return;
      if(!ordersOverlay[orderId]) ordersOverlay[orderId] = {};
      ordersOverlay[orderId].status      = newStatus;
      ordersOverlay[orderId].statusSince = Date.now();
      ordersOverlay[orderId].paused      = false;
      ordersOverlay[orderId].pauseReason = '';
      ordersOverlay[orderId].pausedAt    = null;
      await saveOverlay();
      render();
      showToast('Статус: ' + newStatus, 'success');
      return;
    }
  });

  document.addEventListener('change', (ev)=>{
    if(ev.target.id === 'monthSelect'){ editingMonth = ev.target.value; render(); }
    if(ev.target.id === 'scheduleEmpSelect'){ scheduleEmpId = ev.target.value; render(); }
  });

  // Автосохранение комментариев к заказам (debounce 800ms)
  const commentSaveTimers = {};
  document.addEventListener('input', (ev)=>{
    // Живое обновление «Остаток» в форме продажи
    if(mode==='sales' && (ev.target.id==='sf_total' || ev.target.id==='sf_prepayment')){
      salesForm.total      = (document.getElementById('sf_total')||{}).value||'';
      salesForm.prepayment = (document.getElementById('sf_prepayment')||{}).value||'';
      const total = parseFloat(salesForm.total)||0;
      const prep  = parseFloat(salesForm.prepayment)||0;
      const rem = document.getElementById('sf_remainder_display');
      if(rem) rem.value = '₸' + Math.max(0,total-prep).toLocaleString('ru-RU');
    }
    const ta = ev.target.closest('[data-order-comment]');
    if(!ta) return;
    const orderId = ta.dataset.orderComment;
    const empId   = ta.dataset.empId;
    clearTimeout(commentSaveTimers[orderId]);
    commentSaveTimers[orderId] = setTimeout(async ()=>{
      if(!ordersOverlay[orderId]) ordersOverlay[orderId] = {};
      ordersOverlay[orderId].comment = ta.value;
      await saveOverlay();
      const saved = document.getElementById('saved-' + orderId);
      if(saved){ saved.classList.add('show'); setTimeout(()=>saved.classList.remove('show'), 1800); }
    }, 800);
  });

  // Поддержка ввода PIN с физической клавиатуры (удобно на десктопе)
  document.addEventListener('keydown', async (ev)=>{
    const isDigit = /^[0-9]$/.test(ev.key);
    if(!isDigit && ev.key!=='Backspace') return;
    if(isEditingSomething()) return; // не мешаем вводу в обычные текстовые поля

    if(mode==='employee' && selectingEmpId && !myEmployeeId){
      if(ev.key==='Backspace'){ empPinInput = empPinInput.slice(0,-1); empPinError=''; render(); return; }
      if(empPinInput.length<EMP_PIN_LEN){
        empPinInput += ev.key; empPinError='';
        if(empPinInput.length===EMP_PIN_LEN){
          const emp = employees.find(e=>e.id===selectingEmpId);
          if(emp && empPinInput===emp.pin){
            myEmployeeId = emp.id;
            await storeSet('app:myEmployeeId', emp.id, false);
            selectingEmpId = null; empPinInput='';
          } else { empPinError = 'Неверный PIN'; empPinInput=''; }
        }
        render();
      }
      return;
    }
    if(mode==='admin' && !adminUnlocked){
      if(ev.key==='Backspace'){ pinInput = pinInput.slice(0,-1); pinError=''; render(); return; }
      if(pinInput.length<ADMIN_PIN_LEN){
        pinInput += ev.key; pinError='';
        if(pinInput.length===ADMIN_PIN_LEN){
          if(pinInput===adminPin){ adminUnlocked=true; pinInput=''; }
          else { pinError='Неверный PIN'; pinInput=''; }
        }
        render();
      }
      return;
    }
  });
}

let sheetSyncTimer = null;

let orderTimerHandle = null;

(async function init(){
  attachDelegatedHandlers();
  await loadAll();
  await loadOrders();
  render();
  lastSyncSnapshot = JSON.stringify({freshEmployees:employees, freshKpi:kpiData, freshLogs:logs, freshActiveMonth:activeMonth, freshAdminPin:adminPin, freshSheetUrls:sheetUrls, freshSchedules:schedules, freshLedger:ledgerTotals, freshTrackerUrl:trackerUrl, freshTrackerData:trackerData, freshOrdersCsv:ordersData, freshOrdersOv:ordersOverlay});
  timerHandle = setInterval(tickEmployeeClock, 15000); // часы/счётчик обновляются точечно, без полного render()
  orderTimerHandle = setInterval(tickOrderTimers, 30000); // таймеры заказов обновляются каждые 30с
  if((sheetUrls.op||'').trim() || (sheetUrls.to||'').trim() || (trackerUrl||'').trim()){
    silentAutoSync();
    sheetSyncTimer = setInterval(silentAutoSync, 5*60000);
  }
  // фоновая синхронизация общих данных: отметки/KPI/сотрудники теперь
  // подтягиваются сами на всех устройствах, без нажатия «Обновить»
  startBackgroundSync();
})();

// Подчищаем все таймеры при уходе со страницы — без этого при частых
// программных перезагрузках (например, в webview) они бы копились.
window.addEventListener('pagehide', ()=>{
  if(timerHandle) clearInterval(timerHandle);
  if(sheetSyncTimer) clearInterval(sheetSyncTimer);
  if(orderTimerHandle) clearInterval(orderTimerHandle);
  stopBackgroundSync();
});

// ── Переключатель темы ──
(function(){
  const html = document.documentElement;
  const btn = document.getElementById('themeBtn');
  if(!btn) return;

  // Определяем системную тему
  const prefersDark = () => window.matchMedia('(prefers-color-scheme: dark)').matches;

  // Читаем сохранённое значение: 'dark' | 'light' | null (= системная)
  let saved = localStorage.getItem('dramify-theme');

  function apply(theme) {
    html.classList.remove('dark', 'light');
    if(theme === 'dark') {
      html.classList.add('dark');
      btn.textContent = '☀️';
    } else if(theme === 'light') {
      html.classList.add('light');
      btn.textContent = '🌙';
    } else {
      // авто — следуем системной
      btn.textContent = prefersDark() ? '☀️' : '🌙';
    }
  }

  apply(saved);

  btn.addEventListener('click', () => {
    // Цикл: системная → light → dark → light → dark...
    const isDark = html.classList.contains('dark') || (!html.classList.contains('light') && prefersDark());
    saved = isDark ? 'light' : 'dark';
    localStorage.setItem('dramify-theme', saved);
    apply(saved);
  });

  // Реагируем на смену системной темы (если нет ручного выбора)
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    const current = localStorage.getItem('dramify-theme');
    if(!current) apply(null);
  });
})();

// ── Scroll-to-top button ──
(function(){
  const btn = document.getElementById('scrollTopBtn');
  if(!btn) return;
  window.addEventListener('scroll', () => {
    btn.classList.toggle('visible', window.scrollY > 300);
  }, {passive: true});
})();

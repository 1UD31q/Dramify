<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Учёт • KPI и время</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root{
    --ink:#3B2247;
    --ink-soft:#54325F;
    --paper:#F7ECF3;
    --surface:#FFFFFF;
    --muted:#8A7189;
    --line:#EDDCE8;
    --teal:#1F6F63;
    --teal-dark:#154F46;
    --teal-tint:#E4F1EE;
    --rust:#B5502F;
    --rust-dark:#8A3B22;
    --rust-tint:#F7E9E3;
    --brass:#B8447D;
    --brass-tint:#F8E0EC;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .display{font-family:'Space Grotesk',sans-serif;}

  .app{max-width:640px;margin:0 auto;min-height:100vh;background:var(--paper);display:flex;flex-direction:column;}

  .cover{background:linear-gradient(155deg, var(--ink) 0%, var(--ink-soft) 100%);border-radius:0 0 22px 22px;padding:26px 20px 20px 20px;box-shadow:0 12px 28px -16px rgba(0,0,0,.45);}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
  .stamp{width:38px;height:38px;flex:none;border-radius:50%;border:1.5px solid rgba(255,255,255,.55);display:flex;align-items:center;justify-content:center;position:relative;}
  .stamp::before{content:'';position:absolute;inset:5px;border-radius:50%;border:1px dashed rgba(255,255,255,.35);}
  .stamp svg{width:16px;height:16px;position:relative;}
  .brand h1{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin:0;letter-spacing:-0.01em;color:#fff;}
  .brand .subtitle{font-family:'IBM Plex Mono',monospace;font-size:11px;color:rgba(255,255,255,.55);margin-top:3px;letter-spacing:.02em;}

  .tabs{display:flex;gap:4px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:4px;}
  .tab{flex:1;text-align:center;padding:9px 0;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:rgba(255,255,255,.6);user-select:none;transition:all .15s;}
  .tab.active{background:#fff;color:var(--ink);}

  main{flex:1;padding:20px 20px 44px 20px;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:0 1px 2px rgba(24,34,40,.03);}
  .card h2{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;margin:0 0 14px 0;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}

  select, input[type=text], input[type=number]{
    width:100%;padding:11px 12px;border-radius:9px;border:1px solid var(--line);
    font-family:'Inter',sans-serif;font-size:14px;background:#fff;color:var(--ink);
  }
  select:focus, input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-tint);}
  label.field-label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500;}

  .punch-wrap{display:flex;flex-direction:column;align-items:center;padding:6px 0 4px 0;}
  .status-pill{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);margin-bottom:20px;font-weight:500;}
  .status-pill .dot{width:8px;height:8px;border-radius:50%;}
  .dot.in{background:var(--teal);}
  .dot.out{background:var(--muted);}

  .punch-ring{position:relative;width:172px;height:172px;display:flex;align-items:center;justify-content:center;}
  .punch-ring.on-shift::before{
    content:'';position:absolute;inset:0;border-radius:50%;border:2px solid var(--teal);
    animation:breathe 2.6s ease-in-out infinite;
  }
  @keyframes breathe{
    0%,100%{transform:scale(1);opacity:.55;}
    50%{transform:scale(1.12);opacity:0;}
  }
  @media (prefers-reduced-motion: reduce){ .punch-ring.on-shift::before{animation:none;opacity:0;} }

  .punch-btn{
    width:160px;height:160px;border-radius:50%;border:none;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;color:#fff;letter-spacing:.02em;
    box-shadow:0 10px 26px -10px rgba(24,34,40,.5);transition:transform .12s ease;
  }
  .punch-btn:active{transform:scale(0.96);}
  .punch-btn.ready-in{background:radial-gradient(circle at 32% 26%, #2FA189, var(--teal-dark));box-shadow:0 10px 26px -8px rgba(31,111,99,.55);}
  .punch-btn.ready-out{background:radial-gradient(circle at 32% 26%, #E0633F, #A83E22);box-shadow:0 10px 26px -8px rgba(181,80,47,.55);}
  .punch-btn .sub{font-family:'IBM Plex Mono',monospace;font-weight:400;font-size:12px;opacity:.85;margin-top:6px;}

  .elapsed{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--muted);margin-top:18px;}

  .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .kpi-box{background:var(--paper);border-radius:10px;padding:14px;}
  .kpi-box .label{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px;font-weight:600;}
  .kpi-box .value{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;letter-spacing:-.01em;}

  .plan-bar-wrap{margin-top:16px;}
  .plan-bar-track{height:7px;border-radius:5px;background:var(--paper);overflow:hidden;margin-top:7px;}
  .plan-bar-fill{height:100%;background:var(--teal);border-radius:5px;transition:width .3s;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:6px 8px;border-bottom:1px solid var(--line);font-weight:600;}
  td{padding:10px 8px;border-bottom:1px solid var(--line);}
  tr:last-child td{border-bottom:none;}
  .status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;}

  .log-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px;}
  .log-row:last-child{border-bottom:none;}
  .log-type{font-weight:600;}
  .log-type.in{color:var(--teal);}
  .log-type.out{color:var(--rust);}

  .row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
  .row input, .row select{flex:1;}
  .btn{background:var(--ink);color:#fff;border:none;border-radius:9px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .15s;}
  .btn:hover{opacity:.9;}
  .btn.secondary{background:transparent;border:1px solid var(--line);color:var(--ink);}
  .btn.small{padding:7px 12px;font-size:12px;}
  .btn.teal{background:var(--teal);}
  .btn.danger{background:transparent;border:1px solid var(--rust-tint);color:var(--rust);}

  .hint{font-size:12px;color:var(--muted);line-height:1.55;margin-top:10px;}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:22px 0;}

  select.employee-picker{margin-bottom:14px;}
  .switch-user{font-size:12px;color:var(--teal);text-align:center;margin-top:12px;cursor:pointer;text-decoration:underline;text-underline-offset:2px;font-weight:500;}

  .pin-wrap{display:flex;flex-direction:column;align-items:center;padding:12px 0 4px 0;text-align:center;}
  .pin-wrap p{color:var(--muted);font-size:13px;margin:6px 0 18px 0;}
  .pin-dots{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;justify-content:center;max-width:220px;}
  .pin-dots .slot{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--line);background:#fff;transition:all .12s;}
  .pin-dots .slot.filled{background:var(--ink);border-color:var(--ink);}
  .pin-error{color:var(--rust);font-size:12px;margin-top:8px;min-height:16px;font-weight:500;}
  .keypad{display:grid;grid-template-columns:repeat(3,56px);gap:10px;}
  .keypad button{width:56px;height:56px;border-radius:50%;border:1px solid var(--line);background:#fff;font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600;cursor:pointer;color:var(--ink);transition:background .1s;}
  .keypad button:active{background:var(--paper);}

  .name-list{display:flex;flex-direction:column;gap:8px;}
  .name-btn{text-align:left;padding:11px 14px;border-radius:10px;border:1px solid var(--line);background:#fff;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:12px;color:var(--ink);transition:border-color .12s;}
  .name-btn:hover{border-color:var(--teal);}
  .avatar{width:34px;height:34px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;}
  .avatar.op{background:var(--brass-tint);color:var(--brass);}
  .avatar.to{background:var(--teal-tint);color:var(--teal-dark);}
  .name-btn .meta{display:flex;flex-direction:column;flex:1;}
  .name-btn .dept{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}

  .badge{display:inline-block;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em;}
  .badge.active{background:var(--teal-tint);color:var(--teal-dark);}
  .badge.editing{background:var(--brass-tint);color:var(--brass);}

  .month-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;}
  .dept-group-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:16px 0 8px 0;padding-top:4px;border-top:1px solid var(--line);}
  .dept-group-title:first-child{margin-top:0;padding-top:0;border-top:none;}

  .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 12px;}
  .field-item{display:flex;flex-direction:column;}
  .field-item label{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;}
  .field-item input{width:100%;}
  .emp-edit-name{font-size:14px;font-weight:700;margin-bottom:10px;font-family:'Space Grotesk',sans-serif;}
  .emp-edit-block{padding-bottom:16px;margin-bottom:16px;border-bottom:1px solid var(--line);}
  .emp-edit-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
</style>
</head>
<body>
<div class="app">
  <header class="cover">
    <div class="brand">
      <div class="stamp">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="9" stroke="white" stroke-width="1.6"/>
          <path d="M12 7v5l3.5 2" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <h1>Учёт команды</h1>
        <div class="subtitle">СМЕНЫ · KPI · ОП / ТО</div>
      </div>
    </div>
    <div class="tabs">
      <div class="tab active" data-mode="employee">Сотрудник</div>
      <div class="tab" data-mode="admin">Админ</div>
    </div>
  </header>
  <main id="main"></main>
</div>

<script>
const SHARED = true;
const ADMIN_PIN_LEN = 6;
const EMP_PIN_LEN = 4;

async function storeGet(key, shared){
  try{ const r = await window.storage.get(key, shared); return r ? JSON.parse(r.value) : null; }catch(e){ return null; }
}
async function storeSet(key, value, shared){
  try{ await window.storage.set(key, JSON.stringify(value), shared); }catch(e){ console.error(e); }
}

const TO_FIELDS = [
  {key:'orders', label:'Заказы', type:'number', money:false},
  {key:'completed', label:'Выполнено', type:'number', money:false},
  {key:'netAmount', label:'Чистая сумма', type:'number', money:true},
  {key:'avgCheck', label:'Средний чек', type:'number', money:true},
  {key:'pending', label:'Висит', type:'number', money:true},
  {key:'completionTime', label:'Время выполн.', type:'text', money:false},
];

const OP_FIELDS = [
  {key:'revenue', label:'Выручка', type:'number', money:true},
  {key:'deals', label:'Сделки', type:'number', money:false},
  {key:'plan', label:'План', type:'number', money:true},
  {key:'avgCheck', label:'Средний чек', type:'number', money:true, computed:true},
];

const DEPARTMENTS = {
  op: { label: 'ОП', ratio: {num:'revenue', den:'plan', label:'Выполнение плана'}, fields: OP_FIELDS },
  to: { label: 'ТО', ratio: {num:'completed', den:'orders', label:'Выполнено заказов'}, fields: TO_FIELDS }
};

function zeroKpi(dept){
  const o = {};
  DEPARTMENTS[dept].fields.forEach(f=> o[f.key] = f.type==='number' ? 0 : '');
  return o;
}

const SEED_EMPLOYEES = [
  {id:'e1', name:'Алишер А', department:'to', pin:'1111'},
  {id:'e2', name:'Алишер С', department:'to', pin:'2222'},
  {id:'e3', name:'Артём', department:'to', pin:'3333'},
  {id:'e4', name:'Алихан', department:'to', pin:'4444'},
];

function currentMonthKey(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
function monthLabel(key){
  const [y,m] = key.split('-');
  const names = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  return names[Number(m)-1] + ' ' + y;
}

let employees = [];
let kpiData = {};          // { monthKey: { empId: {...fields} } }
let logs = [];
let activeMonth = currentMonthKey();
let editingMonth = activeMonth;

let myEmployeeId = null;
let mode = 'employee';
let timerHandle = null;

let adminUnlocked = false;
let adminPin = '135790';
let pinInput = '';
let pinError = '';

let selectingEmpId = null;   // employee chosen from list, awaiting their PIN
let empPinInput = '';
let empPinError = '';

const SEED_MONTH_DATA = {
  e1: {orders:15, completed:15, netAmount:983979, avgCheck:65599, pending:0, completionTime:''},
  e2: {orders:20, completed:19, netAmount:924700, avgCheck:48668, pending:40000, completionTime:''},
  e3: {orders:7, completed:6, netAmount:351200, avgCheck:58533, pending:0, completionTime:''},
  e4: {orders:18, completed:18, netAmount:1460792, avgCheck:81155, pending:0, completionTime:''},
};

async function loadAll(){
  employees = await storeGet('app:employees', SHARED);
  if(!employees){ employees = SEED_EMPLOYEES; await storeSet('app:employees', employees, SHARED); }

  kpiData = await storeGet('app:kpiData', SHARED);
  if(!kpiData){
    kpiData = { [currentMonthKey()]: SEED_MONTH_DATA };
    await storeSet('app:kpiData', kpiData, SHARED);
  }

  const storedActive = await storeGet('app:activeMonth', SHARED);
  activeMonth = storedActive || currentMonthKey();
  if(!kpiData[activeMonth]) ensureMonth(activeMonth);
  editingMonth = activeMonth;

  logs = await storeGet('attendance:log', SHARED);
  if(!logs) logs = [];

  myEmployeeId = await storeGet('app:myEmployeeId', false);

  const storedAdminPin = await storeGet('app:adminPin', SHARED);
  if(storedAdminPin) adminPin = storedAdminPin;
}

function ensureMonth(monthKey){
  if(!kpiData[monthKey]) kpiData[monthKey] = {};
  employees.forEach(e=>{
    if(!kpiData[monthKey][e.id]) kpiData[monthKey][e.id] = zeroKpi(e.department);
  });
}

function getKpi(empId, monthKey){
  const emp = employees.find(e=>e.id===empId);
  ensureMonth(monthKey);
  return kpiData[monthKey][empId] || zeroKpi(emp.department);
}

function fmtMoney(n){ return new Intl.NumberFormat('ru-RU').format(Math.round(n)) + ' ₸'; }
function fmtTime(ts){ return new Date(ts).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}); }
function fmtDateTime(ts){ const d=new Date(ts); return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'}) + ' ' + fmtTime(ts); }
function isToday(ts){ return new Date(ts).toDateString() === new Date().toDateString(); }

function lastLogFor(empId){
  const list = logs.filter(l=>l.empId===empId).sort((a,b)=>b.ts-a.ts);
  return list[0] || null;
}
function isCheckedIn(empId){ const last = lastLogFor(empId); return last && last.type === 'in'; }
function todayHoursFor(empId){
  const todays = logs.filter(l=>l.empId===empId && isToday(l.ts)).sort((a,b)=>a.ts-b.ts);
  let total = 0, openIn = null;
  todays.forEach(l=>{
    if(l.type==='in') openIn = l.ts;
    else if(l.type==='out' && openIn!==null){ total += (l.ts-openIn); openIn=null; }
  });
  if(openIn!==null) total += (Date.now()-openIn);
  return total;
}
function fmtDuration(ms){
  const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000);
  return (h>0? h+'ч ' : '') + m + 'м';
}

async function punch(empId){
  logs.push({empId, type: isCheckedIn(empId) ? 'out' : 'in', ts: Date.now()});
  await storeSet('attendance:log', logs, SHARED);
  render();
}

async function saveKpiForMonth(monthKey, empId, values){
  ensureMonth(monthKey);
  kpiData[monthKey][empId] = values;
  await storeSet('app:kpiData', kpiData, SHARED);
}

async function activateMonth(monthKey){
  activeMonth = monthKey;
  await storeSet('app:activeMonth', monthKey, SHARED);
  render();
}

async function addMonth(monthKey){
  if(!/^\d{4}-\d{2}$/.test(monthKey)) return;
  ensureMonth(monthKey);
  await storeSet('app:kpiData', kpiData, SHARED);
  editingMonth = monthKey;
  render();
}

async function setAdminPin(newPin){ adminPin = newPin; await storeSet('app:adminPin', newPin, SHARED); }

async function saveEmployee(emp){
  const idx = employees.findIndex(e=>e.id===emp.id);
  if(idx>=0) employees[idx] = emp; else employees.push(emp);
  ensureMonth(editingMonth);
  await storeSet('app:employees', employees, SHARED);
  await storeSet('app:kpiData', kpiData, SHARED);
}

// ---------- render ----------
function render(){
  const main = document.getElementById('main');
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.mode===mode));
  main.innerHTML = mode==='employee' ? renderEmployeeArea() : renderAdminView();
  attachHandlers();
}

function renderEmployeeArea(){
  if(myEmployeeId && employees.find(e=>e.id===myEmployeeId)) return renderEmployeeDashboard();
  if(selectingEmpId) return renderEmpPinGate();
  return renderEmployeeList();
}

function renderEmployeeList(){
  const groups = {};
  employees.forEach(e=>{ (groups[e.department]=groups[e.department]||[]).push(e); });
  let html = `<div class="card"><h2>Кто вы?</h2><div class="name-list">`;
  Object.keys(groups).forEach(dept=>{
    groups[dept].forEach(e=>{
      const initials = e.name.split(' ').map(p=>p[0]).slice(0,2).join('').toUpperCase();
      html += `<div class="name-btn" data-pick="${e.id}">
        <div class="avatar ${dept}">${initials}</div>
        <div class="meta">${e.name}<span class="dept">${DEPARTMENTS[dept].label}</span></div>
      </div>`;
    });
  });
  html += `</div><div class="hint">Выберите себя и введите свой личный PIN. Он нужен, чтобы никто другой не открыл вашу страницу.</div></div>`;
  return html;
}

function renderEmpPinGate(){
  const emp = employees.find(e=>e.id===selectingEmpId);
  const slots = Array.from({length:EMP_PIN_LEN}).map((_,i)=>`<div class="slot ${i<empPinInput.length?'filled':''}"></div>`).join('');
  const keys = ['1','2','3','4','5','6','7','8','9','','0','⌫'];
  return `
    <div class="card">
      <div class="pin-wrap">
        <h2 style="margin-bottom:0;">${emp.name}</h2>
        <p>Введите свой PIN</p>
        <div class="pin-dots">${slots}</div>
        <div class="keypad">${keys.map(k=> k==='' ? `<div></div>` : `<button data-empkey="${k}">${k}</button>`).join('')}</div>
        <div class="pin-error">${empPinError}</div>
        <div class="switch-user" id="backToList">← Это не я, выбрать другого</div>
      </div>
    </div>`;
}

function renderEmployeeDashboard(){
  const emp = employees.find(e=>e.id===myEmployeeId);
  const dept = DEPARTMENTS[emp.department];
  const checkedIn = isCheckedIn(emp.id);
  const todays = logs.filter(l=>l.empId===emp.id && isToday(l.ts)).sort((a,b)=>a.ts-b.ts);
  const k = getKpi(emp.id, activeMonth);
  const num = Number(k[dept.ratio.num])||0, den = Number(k[dept.ratio.den])||0;
  const ratioPct = den>0 ? Math.min(100, Math.round(num/den*100)) : 0;

  const kpiBoxes = dept.fields.map(f=>{
    let val = k[f.key];
    if(f.computed && f.key==='avgCheck' && emp.department==='op'){
      val = (Number(k.deals)>0) ? (Number(k.revenue)/Number(k.deals)) : 0;
    }
    const display = f.type==='number' ? (f.money ? fmtMoney(val) : val) : (val || '—');
    return `<div class="kpi-box"><div class="label">${f.label}</div><div class="value">${display}</div></div>`;
  }).join('');

  return `
    <div class="card">
      <div class="punch-wrap">
        <div class="status-pill"><span class="dot ${checkedIn?'in':'out'}"></span>${emp.name} · ${checkedIn?'на смене':'не на смене'}</div>
        <div class="punch-ring ${checkedIn?'on-shift':''}">
          <button class="punch-btn ${checkedIn?'ready-out':'ready-in'}" id="punchBtn">
            ${checkedIn?'END':'START'}
            <span class="sub">${fmtTime(Date.now())}</span>
          </button>
        </div>
        <div class="elapsed">Сегодня отработано: ${fmtDuration(todayHoursFor(emp.id))}</div>
        <div class="switch-user" id="switchUser">Это не я</div>
      </div>
    </div>

    <div class="card">
      <h2>KPI · ${monthLabel(activeMonth)}</h2>
      <div class="kpi-grid">${kpiBoxes}</div>
      <div class="plan-bar-wrap">
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);"><span>${dept.ratio.label}</span><span>${ratioPct}%</span></div>
        <div class="plan-bar-track"><div class="plan-bar-fill" style="width:${ratioPct}%"></div></div>
      </div>
    </div>

    <div class="card">
      <h2>Мои отметки сегодня</h2>
      ${todays.length===0 ? '<div class="empty">Пока нет отметок</div>' :
        todays.map(l=>`<div class="log-row"><span class="log-type ${l.type}">${l.type==='in'?'Приход':'Уход'}</span><span class="mono">${fmtTime(l.ts)}</span></div>`).join('')}
    </div>`;
}

function renderPinGate(){
  const slots = Array.from({length:ADMIN_PIN_LEN}).map((_,i)=>`<div class="slot ${i<pinInput.length?'filled':''}"></div>`).join('');
  const keys = ['1','2','3','4','5','6','7','8','9','','0','⌫'];
  return `
    <div class="card">
      <div class="pin-wrap">
        <h2 style="margin-bottom:0;">Доступ администратора</h2>
        <p>Введите PIN-код (${ADMIN_PIN_LEN} цифр)</p>
        <div class="pin-dots">${slots}</div>
        <div class="keypad">${keys.map(k=> k==='' ? `<div></div>` : `<button data-key="${k}">${k}</button>`).join('')}</div>
        <div class="pin-error">${pinError}</div>
      </div>
    </div>`;
}

function renderAdminView(){
  if(!adminUnlocked) return renderPinGate();

  const rows = employees.map(e=>{
    const checkedIn = isCheckedIn(e.id);
    const last = lastLogFor(e.id);
    return `<tr>
      <td>${e.name}</td>
      <td><span class="status-dot" style="background:${checkedIn?'#1F6F63':'#9AA5A8'}"></span>${checkedIn?'На смене':'Не на смене'}</td>
      <td class="mono">${fmtDuration(todayHoursFor(e.id))}</td>
      <td class="mono">${last? fmtDateTime(last.ts):'—'}</td>
    </tr>`;
  }).join('');

  const monthOptions = Object.keys(kpiData).sort().reverse().map(mk=>
    `<option value="${mk}" ${mk===editingMonth?'selected':''}>${monthLabel(mk)}${mk===activeMonth?' (активный)':''}</option>`
  ).join('');

  ensureMonth(editingMonth);
  const groups = {};
  employees.forEach(e=>{ (groups[e.department]=groups[e.department]||[]).push(e); });

  let kpiEditor = '';
  Object.keys(groups).forEach(dept=>{
    kpiEditor += `<div class="dept-group-title">${DEPARTMENTS[dept].label}</div>`;
    groups[dept].forEach(e=>{
      const k = getKpi(e.id, editingMonth);
      kpiEditor += `<div class="emp-edit-block">
        <div class="emp-edit-name">${e.name}</div>
        <div class="field-grid">
          ${DEPARTMENTS[dept].fields.filter(f=>!f.computed).map(f=>`
            <div class="field-item">
              <label>${f.label}</label>
              <input type="${f.type}" data-emp="${e.id}" data-field="${f.key}" value="${k[f.key]}">
            </div>
          `).join('')}
        </div>
      </div>`;
    });
  });

  const allLogs = logs.slice().sort((a,b)=>b.ts-a.ts).slice(0,30);
  const logRows = allLogs.map(l=>{
    const emp = employees.find(e=>e.id===l.empId);
    return `<div class="log-row"><span>${emp?emp.name:'—'} · <span class="log-type ${l.type}">${l.type==='in'?'приход':'уход'}</span></span><span class="mono">${fmtDateTime(l.ts)}</span></div>`;
  }).join('');

  return `
    <div class="card">
      <h2>Статус команды сейчас</h2>
      <table><thead><tr><th>Сотрудник</th><th>Статус</th><th>Сегодня</th><th>Последняя отметка</th></tr></thead><tbody>${rows}</tbody></table>
    </div>

    <div class="card">
      <h2>Период отчёта</h2>
      <div class="month-row">
        <select id="monthSelect">${monthOptions}</select>
        <button class="btn small secondary" id="addMonthBtn">+ Месяц</button>
      </div>
      <div style="margin:10px 0;">
        ${editingMonth===activeMonth ? '<span class="badge active">Активный для сотрудников</span>' : '<span class="badge editing">Черновик — сотрудники не видят</span>'}
      </div>
      ${editingMonth!==activeMonth ? `<button class="btn teal small" id="activateBtn">Сделать активным для сотрудников</button>` : ''}
      <div class="hint">Правьте цифры за нужный месяц, затем сделайте его активным — тогда сотрудники увидят новые данные. Прошлые месяцы сохраняются и доступны для просмотра.</div>
    </div>

    <div class="card">
      <h2>KPI сотрудников · ${monthLabel(editingMonth)}</h2>
      ${kpiEditor}
      <button class="btn" id="saveKpiBtn">Сохранить KPI</button>
    </div>

    <div class="card">
      <h2>Сотрудники и PIN</h2>
      ${employees.map(e=>`
        <div class="row">
          <div style="width:110px;font-size:13px;flex:none;">${e.name}</div>
          <input type="text" data-pinemp="${e.id}" value="${e.pin}" maxlength="4" placeholder="PIN">
          <button class="btn secondary small" data-delemp="${e.id}" style="flex:none;color:var(--rust);">Удалить</button>
        </div>`).join('')}
      <button class="btn secondary small" id="savePinsBtn">Сохранить PIN сотрудников</button>
      <div class="hint">Личный PIN не даёт другим зайти на страницу сотрудника.</div>
    </div>

    <div class="card">
      <h2>Добавить сотрудника</h2>
      <div class="row">
        <input type="text" id="newEmpName" placeholder="Имя">
        <select id="newEmpDept">
          <option value="op">ОП</option>
          <option value="to">ТО</option>
        </select>
      </div>
      <div class="row">
        <input type="text" id="newEmpPin" placeholder="PIN (4 цифры)" maxlength="4">
        <button class="btn small" id="addEmpBtn">Добавить</button>
      </div>
    </div>

    <div class="card">
      <h2>Журнал посещений</h2>
      ${logRows.length===0? '<div class="empty">Логов пока нет</div>' : logRows}
    </div>

    <div class="card">
      <h2>PIN администратора</h2>
      <div class="row">
        <input type="text" id="newAdminPin" placeholder="Новый PIN (${ADMIN_PIN_LEN} цифр)" maxlength="${ADMIN_PIN_LEN}">
        <button class="btn secondary small" id="changePinBtn">Изменить</button>
      </div>
      <div class="hint" style="margin-top:0;">Текущий PIN нужен, чтобы открыть эту вкладку. Сообщайте его только доверенным людям.</div>
    </div>
  `;
}

function attachHandlers(){
  document.querySelectorAll('.tab').forEach(t=>{
    t.onclick = ()=>{
      mode = t.dataset.mode;
      if(mode==='admin'){ /* keep adminUnlocked state as-is within session */ }
      render();
    };
  });

  // employee selection list
  document.querySelectorAll('[data-pick]').forEach(btn=>{
    btn.onclick = ()=>{ selectingEmpId = btn.dataset.pick; empPinInput=''; empPinError=''; render(); };
  });
  const backBtn = document.getElementById('backToList');
  if(backBtn) backBtn.onclick = ()=>{ selectingEmpId = null; render(); };

  // employee pin keypad
  document.querySelectorAll('.keypad button[data-empkey]').forEach(btn=>{
    btn.onclick = async ()=>{
      const k = btn.dataset.empkey;
      if(k==='⌫'){ empPinInput = empPinInput.slice(0,-1); empPinError=''; }
      else if(empPinInput.length<EMP_PIN_LEN){ empPinInput += k; empPinError=''; }
      if(empPinInput.length===EMP_PIN_LEN){
        const emp = employees.find(e=>e.id===selectingEmpId);
        if(empPinInput===emp.pin){
          myEmployeeId = emp.id;
          await storeSet('app:myEmployeeId', emp.id, false);
          selectingEmpId = null; empPinInput='';
        } else { empPinError = 'Неверный PIN'; empPinInput=''; }
      }
      render();
    };
  });

  // admin pin keypad
  document.querySelectorAll('.keypad button[data-key]').forEach(btn=>{
    btn.onclick = ()=>{
      const k = btn.dataset.key;
      if(k==='⌫'){ pinInput = pinInput.slice(0,-1); pinError=''; }
      else if(pinInput.length<ADMIN_PIN_LEN){ pinInput += k; pinError=''; }
      if(pinInput.length===ADMIN_PIN_LEN){
        if(pinInput===adminPin){ adminUnlocked=true; pinInput=''; }
        else { pinError='Неверный PIN'; pinInput=''; }
      }
      render();
    };
  });

  const punchBtn = document.getElementById('punchBtn');
  if(punchBtn) punchBtn.onclick = ()=> punch(myEmployeeId);

  const switchUser = document.getElementById('switchUser');
  if(switchUser) switchUser.onclick = async ()=>{ myEmployeeId=null; await storeSet('app:myEmployeeId', null, false); render(); };

  const monthSelect = document.getElementById('monthSelect');
  if(monthSelect) monthSelect.onchange = (e)=>{ editingMonth = e.target.value; render(); };

  const addMonthBtn = document.getElementById('addMonthBtn');
  if(addMonthBtn) addMonthBtn.onclick = ()=>{
    const now = new Date();
    const next = new Date(now.getFullYear(), now.getMonth()+1, 1);
    const suggested = next.getFullYear() + '-' + String(next.getMonth()+1).padStart(2,'0');
    const val = prompt('Новый месяц в формате ГГГГ-ММ:', suggested);
    if(val) addMonth(val.trim());
  };

  const activateBtn = document.getElementById('activateBtn');
  if(activateBtn) activateBtn.onclick = ()=> activateMonth(editingMonth);

  const saveBtn = document.getElementById('saveKpiBtn');
  if(saveBtn) saveBtn.onclick = async ()=>{
    const inputs = document.querySelectorAll('[data-emp]');
    const grouped = {};
    inputs.forEach(i=>{ grouped[i.dataset.emp] = grouped[i.dataset.emp] || {}; grouped[i.dataset.emp][i.dataset.field] = i.value; });
    for(const empId in grouped){
      const emp = employees.find(e=>e.id===empId);
      const dept = DEPARTMENTS[emp.department];
      const values = {};
      dept.fields.forEach(f=>{ values[f.key] = f.type==='number' ? (Number(grouped[empId][f.key])||0) : (grouped[empId][f.key]||''); });
      await saveKpiForMonth(editingMonth, empId, values);
    }
    render();
  };

  const savePinsBtn = document.getElementById('savePinsBtn');
  if(savePinsBtn) savePinsBtn.onclick = async ()=>{
    const inputs = document.querySelectorAll('[data-pinemp]');
    inputs.forEach(i=>{
      const emp = employees.find(e=>e.id===i.dataset.pinemp);
      if(emp && /^\d{4}$/.test(i.value.trim())) emp.pin = i.value.trim();
    });
    await storeSet('app:employees', employees, SHARED);
    render();
  };

  const addEmpBtn = document.getElementById('addEmpBtn');
  if(addEmpBtn) addEmpBtn.onclick = async ()=>{
    const name = document.getElementById('newEmpName').value.trim();
    const dept = document.getElementById('newEmpDept').value;
    const pin = document.getElementById('newEmpPin').value.trim();
    if(!name || !/^\d{4}$/.test(pin)){ alert('Укажите имя и 4-значный PIN'); return; }
    const id = 'e' + Date.now();
    await saveEmployee({id, name, department:dept, pin});
    render();
  };

  document.querySelectorAll('[data-delemp]').forEach(btn=>{
    btn.onclick = async ()=>{
      const emp = employees.find(e=>e.id===btn.dataset.delemp);
      if(!emp) return;
      if(!confirm('Удалить сотрудника «' + emp.name + '»? Его KPI и логи посещений останутся в истории, но профиль исчезнет.')) return;
      employees = employees.filter(e=>e.id!==emp.id);
      await storeSet('app:employees', employees, SHARED);
      render();
    };
  });

  const changePinBtn = document.getElementById('changePinBtn');
  if(changePinBtn) changePinBtn.onclick = async ()=>{
    const val = document.getElementById('newAdminPin').value.trim();
    if(new RegExp('^\\d{'+ADMIN_PIN_LEN+'}$').test(val)){ await setAdminPin(val); render(); }
    else { alert('PIN должен состоять из ' + ADMIN_PIN_LEN + ' цифр'); }
  };
}

(async function init(){
  await loadAll();
  render();
  timerHandle = setInterval(()=>{ if(mode==='employee') render(); }, 60000);
})();
</script>
</body>
</html>
